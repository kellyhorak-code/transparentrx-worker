<!DOCTYPE html>

<script>
/* ── GLOBAL ARC SAFETY PATCH ──
   Clamps negative radii to 0.001 so canvas arc never throws.
   Belt-and-suspenders on top of inline Math.max guards. */
(function(){
  const _arc = CanvasRenderingContext2D.prototype.arc;
  CanvasRenderingContext2D.prototype.arc = function(x,y,r,startAngle,endAngle,ccw){
    _arc.call(this, x, y, Math.max(0.001, r||0), startAngle, endAngle, ccw);
  };
})();
</script>

<meta charset="UTF-8">

<title>Rifle Ranch — Long Range</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;500;600;700&family=Barlow:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#04080e;--panel:rgba(4,8,14,.94);--panel2:rgba(8,14,22,.97);
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);
  --blue:#3060a0;--blue2:#5090d8;--blue3:#80c0ff;
  --gold:#c8a020;--gold2:#e8c040;
  --green:#38c060;--red:#d03030;--amber:#e8a030;
  --text:#dce8f0;--muted:rgba(220,232,240,.45);
}
html,body{height:100%;overflow:hidden;background:var(--bg);touch-action:none}
body{font-family:'Barlow',sans-serif;color:var(--text);user-select:none;-webkit-user-select:none}
canvas{display:block}
#root{display:flex;flex-direction:column;height:100vh;height:100dvh}

/* TOP BAR */
#topbar{
  background:var(--panel);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;
  height:52px;gap:0;flex-shrink:0;position:relative;z-index:10
}
.brand{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;color:var(--blue2);white-space:nowrap;margin-right:18px}
.brand em{color:var(--text);font-style:normal}
.stat-row{display:flex;align-items:center;gap:0;flex:1;overflow:hidden}
.stat-item{display:flex;flex-direction:column;align-items:center;padding:0 13px;border-right:1px solid var(--border);min-width:68px}
.stat-item:last-of-type{border-right:none}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;line-height:1;color:var(--text)}
.stat-val.b{color:var(--blue2)}.stat-val.g{color:var(--green)}.stat-val.a{color:var(--amber)}.stat-val.r{color:var(--red)}
.stat-lbl{font-family:'Oswald',sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:1px}
.topbar-spacer{flex:1}
.mode-pill{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;border:1px solid var(--border2);color:var(--muted);padding:4px 10px;white-space:nowrap}

/* MAIN */
#main{flex:1;display:flex;overflow:hidden;position:relative}

/* RIFLE SELECTOR SIDEBAR */
#rifleBar{
  width:70px;background:var(--panel);border-right:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:5px;
  flex-shrink:0;overflow-y:auto;scrollbar-width:none
}
#rifleBar::-webkit-scrollbar{display:none}
.rifle-thumb{
  width:54px;height:54px;border:1px solid var(--border2);
  background:var(--panel2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:2px;transition:all .15s;flex-shrink:0;position:relative
}
.rifle-thumb canvas{width:46px;height:28px}
.rifle-thumb .r-cal{font-family:'Oswald',sans-serif;font-size:7px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;text-align:center}
.rifle-thumb.active{border-color:var(--blue2);background:rgba(80,144,216,.07)}
.rifle-thumb:hover:not(.active){border-color:rgba(255,255,255,.18)}
.rifle-thumb .dot{position:absolute;top:3px;right:3px;width:5px;height:5px;border-radius:50%;background:var(--blue2);opacity:0;transition:opacity .15s}
.rifle-thumb.active .dot{opacity:1}

/* RANGE CANVAS */
#rangeWrap{flex:1;position:relative;overflow:hidden;cursor:crosshair}
#rangeCanvas{width:100%;height:100%}

/* SCOPE OVERLAY */
#scopeOverlay{
  position:absolute;inset:0;pointer-events:none;opacity:0;
  transition:opacity .2s;z-index:5
}
#scopeOverlay.visible{opacity:1}

/* BALLISTIC PANEL (right sidebar) */
#balPanel{
  width:72px;background:var(--panel);border-left:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:5px;flex-shrink:0
}
.bal-btn{
  width:54px;padding:5px 0;background:transparent;border:1px solid var(--border2);
  color:var(--muted);font-family:'Oswald',sans-serif;font-size:10px;
  letter-spacing:1px;cursor:pointer;transition:all .15s;text-align:center
}
.bal-btn.active{border-color:var(--blue2);color:var(--blue2);background:rgba(80,144,216,.07)}
.bal-btn:hover:not(.active){border-color:rgba(255,255,255,.2);color:var(--text)}
.bal-label{font-family:'Oswald',sans-serif;font-size:8px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;writing-mode:vertical-rl;transform:rotate(180deg);margin-bottom:4px}

/* INFO BAR (bottom) */
#infoBar{
  background:var(--panel);border-top:1px solid var(--border);
  display:flex;align-items:center;height:78px;flex-shrink:0;overflow:hidden
}
#riflePreview{width:200px;height:78px;flex-shrink:0}
#rifleDetails{padding:10px 16px;flex:1;display:flex;flex-direction:column;justify-content:center;gap:4px}
.rifle-name-big{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--text)}
.rifle-specs-row{display:flex;gap:14px;flex-wrap:wrap}
.rifle-spec{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:1.5px;text-transform:uppercase}
.rifle-spec em{color:var(--blue2);font-style:normal}

#infoBar .wind-section{
  border-left:1px solid var(--border);padding:0 18px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;flex-shrink:0
}
.wind-big{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;line-height:1;color:var(--blue3)}
.wind-dir{font-family:'Oswald',sans-serif;font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
.wind-arrow-row{display:flex;align-items:center;gap:4px}
#windArrowBig{font-size:18px;transition:transform .8s}

#infoBar .dist-section{
  border-left:1px solid var(--border);padding:0 18px;
  text-align:center;flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px
}
.dist-big{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;line-height:1}
.dist-label{font-family:'Oswald',sans-serif;font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase}

/* OVERLAYS */
.overlay{position:absolute;inset:0;background:rgba(2,4,8,.92);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:50;transition:opacity .35s}
.overlay.gone{opacity:0;pointer-events:none}
.card{background:var(--panel);border:1px solid var(--border2);padding:28px 36px;max-width:480px;width:92%;text-align:center}
.card-eyebrow{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--blue2);margin-bottom:8px}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:46px;letter-spacing:4px;line-height:1;margin-bottom:4px}
.card-sub{font:300 13px/1.7 'Barlow',sans-serif;color:var(--muted);margin-bottom:20px}
.rules{background:rgba(255,255,255,.02);border:1px solid var(--border);padding:13px 16px;margin-bottom:18px;text-align:left}
.rule{font-family:'Barlow',sans-serif;font-size:12px;color:var(--muted);padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);display:flex;gap:8px;align-items:center}
.rule:last-child{border:none}
.rule strong{color:var(--blue2)}
.cta{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:4px;background:var(--blue2);color:#000;border:none;padding:13px 44px;cursor:pointer;transition:all .2s}
.cta:hover{background:var(--blue3);transform:translateY(-2px);box-shadow:0 8px 24px rgba(80,144,216,.4)}
.results-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}
.res-box{background:rgba(255,255,255,.02);border:1px solid var(--border);padding:12px}
.res-num{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--amber)}
.res-lbl{font-family:'Oswald',sans-serif;font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
.score-mega{font-family:'Bebas Neue',sans-serif;font-size:68px;letter-spacing:2px;line-height:1;color:var(--text)}
.rank-pill{display:inline-block;border:1px solid var(--blue2);color:var(--blue2);font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;padding:4px 14px;margin-bottom:10px}

/* flash */
#fireHint.visible{display:block!important}
#flash{position:absolute;inset:0;background:rgba(200,240,255,.12);pointer-events:none;opacity:0;z-index:8}
#flash.on{opacity:1;transition:none}
#flash.off{opacity:0;transition:opacity .12s}

/* scope cursor */
#rangeWrap.scoped{cursor:none}

/* responsive */
@media(max-width:560px){
  #rifleBar{width:54px}.rifle-thumb{width:42px;height:42px}.rifle-thumb canvas{width:36px}
  #balPanel{width:52px}.bal-btn{width:40px;font-size:8px}
  #riflePreview{width:140px}
  .rifle-name-big{font-size:16px}
  .stat-item{padding:0 8px;min-width:54px}.stat-val{font-size:18px}
}

/* ── RIFLE AI SESSION ── */

#rifleAiBadge.show{opacity:.9}

#rifleAiBriefing.show{opacity:1}

#rifleAiOverlay.show{display:flex}
.rai-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:6px;color:var(--blue2)}
.rai-sub{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted)}
.rai-bar{width:200px;height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
.rai-fill{height:100%;background:var(--blue2);border-radius:2px;animation:raiFill 1.2s ease-in-out infinite alternate}
@keyframes raiFill{from{width:15%}to{width:85%}}

/* ═══════════════════════════════════════
   MOBILE RESPONSIVE — shared patch
═══════════════════════════════════════ */
@media (max-width: 600px){
  /* Weapon / selector bars: wrap on small screens */
  #weaponBar, #inGameSelectors, #chokeBar, #distSel{
    flex-wrap:wrap;
    font-size:11px !important;
  }
  .wb-btn, .ig-pill, .chk-pill, .db{
    padding:6px 8px !important;
    font-size:11px !important;
  }
  /* HUD: smaller text */
  .sv, .sv2, #timerBig, #timerBig2{
    font-size:18px !important;
  }
  .sl, .sl2{
    font-size:6px !important;
  }
  /* Buttons: min 44px tap target */
  button, .btn, .cta, .cta2, .dist-btn, .wb-btn, .ig-pill{
    min-height:44px;
  }
  /* Start screen cards: full width */
  .card{
    padding:20px 16px !important;
    max-width:100% !important;
  }
  /* Prevent horizontal scroll */
  body{ overflow-x:hidden; }
}
@media (max-width: 380px){
  .wb-btn span.wb-cal{ display:none; }
  .hudPanel{ gap:0; }
}

/* ── MOBILE FONT CLAMP ── */
.sv,.sv2,#timerBig,#timerBig2{font-size:clamp(16px,4vw,26px) !important}
.sl,.sl2{font-size:clamp(6px,1.5vw,9px) !important}
.brand,.brand2{font-size:clamp(12px,3vw,18px) !important}
#hud,#hud2{flex-wrap:wrap}
.hudPanel{padding:6px 8px !important}

/* ═══════════════════════════════════════════════════════
   MOBILE LANDSCAPE OPTIMIZATION
   All sizes proportional — no cramping at any screen size
═══════════════════════════════════════════════════════ */

/* Force landscape hint overlay */
#rotateHint{
  display:none;pointer-events:none;
  position:fixed;inset:0;z-index:99999;
  background:rgba(4,6,10,.97);
  flex-direction:column;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;letter-spacing:3px;color:#ece6d8;
  text-align:center;
}
#rotateHint.show{display:flex;pointer-events:none}
#rotateHint .ricon{font-size:clamp(48px,12vw,80px);margin-bottom:16px;animation:rotatePulse 1.8s ease-in-out infinite}
#rotateHint .rtxt{font-size:clamp(18px,5vw,28px);color:rgba(255,255,255,.6);letter-spacing:4px}
@keyframes rotatePulse{0%,100%{transform:rotate(0deg)}50%{transform:rotate(90deg)}}

/* Fullscreen button */
#fullscreenBtn{
  position:fixed;bottom:clamp(6px,2vw,12px);right:clamp(6px,2vw,12px);
  z-index:90;
  width:clamp(32px,5vw,42px);height:clamp(32px,5vw,42px);
  background:rgba(4,6,10,.85);border:1px solid rgba(255,255,255,.15);
  color:rgba(255,255,255,.5);font-size:clamp(14px,2.5vw,18px);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(8px);transition:all .2s;pointer-events:all;
  border-radius:4px;
}
#fullscreenBtn:hover,#fullscreenBtn:active{
  border-color:rgba(255,255,255,.4);color:#fff;
  background:rgba(255,255,255,.1);
}

/* DPR canvas sharpness handled in JS */

/* Safe area insets for notch/island */
@supports(padding:max(0px)){
  #hud,#hud2{
    padding-left:max(6px,env(safe-area-inset-left));
    padding-right:max(6px,env(safe-area-inset-right));
  }
  #root{
    padding-bottom:env(safe-area-inset-bottom);
  }
}

/* Proportional HUD sizing in landscape */
@media (max-height:500px) and (orientation:landscape){
  /* HUD panels shrink proportionally */
  .hudPanel,.si{padding:2px 4px !important}
  .sv,.sv2{font-size:clamp(12px,3.5vh,20px) !important}
  .sl,.sl2{font-size:clamp(5px,1.2vh,8px) !important;letter-spacing:1px !important}
  .brand,.brand2{font-size:clamp(10px,2.5vh,16px) !important}
  /* Buttons scale to height not width */
  button,.btn,.cta,.cta2,.gren-btn,.wb-btn,.bal-btn,.bow-btn,.db{
    padding:clamp(4px,1.5vh,10px) clamp(6px,2vw,16px) !important;
    font-size:clamp(9px,2vh,14px) !important;
    min-height:clamp(28px,6vh,44px) !important;
  }
  /* Bottom HUD panels tighter */
  #bhud,#weaponBar,#distSel,#grenadeBar{
    padding:2px 6px !important;
  }
  /* Card overlay smaller */
  .card{padding:12px 16px !important}
  .title2,.card-title{font-size:clamp(28px,8vh,52px) !important}
}

/* ═══════════════════════════════════════════════
   LANDSCAPE OVERLAP FIX
   All vertical offsets scale with vh so nothing
   overlaps at any landscape screen height
═══════════════════════════════════════════════ */
@media (orientation:landscape) and (max-height:520px){
  /* HUD top bar — stay tight to top */
  #hud,#hud2{
    top:0 !important;
    padding-top:max(2px,env(safe-area-inset-top));
  }
  /* Sky hud in swat */
  #skyHud{ height:32px !important; }
  #skyArcCanvas{ height:32px !important; }

  /* AI badges — below hud, not overlapping canvas */
  #aiSessionBadge,#aiSessionBadge2,#rifleAiBadge,#bowAiBadge,#aiBadge{
    top:clamp(38px,10vh,56px) !important;
  }
  /* Briefings — above bottom bars, not overlapping them */
  #aiBriefing,#aiBriefing2,#bowAiBriefing,#rifleAiBriefing,#briefingHud{
    bottom:clamp(50px,16vh,90px) !important;
    font-size:clamp(9px,2.2vh,13px) !important;
    max-width:70vw !important;
  }
  /* Bow end display */
  #bowEndDisplay{ top:clamp(4px,1.5vh,10px) !important; }
  /* Clay selectors */
  #inGameSelectors{ bottom:clamp(42px,12vh,88px) !important; }
  #chokeBar{        bottom:clamp(24px,7vh,46px)  !important; }
  #stillDistBar{    top:clamp(36px,10vh,60px)     !important; }
  #adaptiveToast{   bottom:clamp(80px,22vh,180px) !important; }
  /* Rifle AI badge */
  
  /* SWAT */
  #roomBadge{    top:clamp(34px,9vh,58px)         !important; }
  #weaponReadout{bottom:clamp(18px,6vh,32px)       !important; }
  #ammoBar{      bottom:clamp(4px,2vh,10px)        !important; }

  /* Bottom panels: shrink font + padding so they don't eat the canvas */
  #bhud,#weaponBar,#distSel,#chokeBar,#inGameSelectors{
    padding:2px 8px !important;
    gap:4px !important;
  }
  .bow-btn,.wb-btn,.ig-pill,.chk-pill,.bal-btn,.db{
    padding:3px 7px !important;
    font-size:clamp(9px,2.5vh,12px) !important;
    min-height:clamp(26px,7vh,36px) !important;
  }
  /* Gun selector panels */
  #gunSel,#rifleBar,#bowSel{
    flex-wrap:nowrap !important;
    overflow-x:auto !important;
    max-height:clamp(36px,10vh,48px) !important;
  }
  /* Start screen cards fit in landscape */
  .card{
    padding:10px 14px !important;
    max-height:96vh !important;
    overflow-y:auto !important;
  }
  .title,.title2,.card-title{
    font-size:clamp(24px,7vh,44px) !important;
    margin-bottom:4px !important;
  }
  .rules,.rules2{
    font-size:clamp(8px,2vh,11px) !important;
    gap:3px !important;
  }
  .cta,.cta2{
    padding:8px 20px !important;
    font-size:clamp(14px,4vh,20px) !important;
    margin-top:6px !important;
  }
}

.start-sel-label{font-family:'Oswald',sans-serif;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin:12px 0 6px}
.start-rifle-wrap{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:4px}

.start-rifle-thumb.active{border-color:#8ab8d8;background:rgba(138,184,216,.08)}

.start-dist-wrap{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:4px}

.start-dist-btn.active{border-color:#8ab8d8;color:var(--text);background:rgba(138,184,216,.08)}

}

.ch-start-hint.hidden{display:none}

/* ══════════════════════════════════════════════
   RIFLE DRAWING FUNCTIONS
══════════════════════════════════════════════ */
function rrect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function drawScope(ctx,x,y,s,w=36,col='#1c2028'){
  ctx.fillStyle=col;rrect(ctx,x,y,w,9,4.5);ctx.fill();
  ctx.fillStyle='#242830';rrect(ctx,x+8,y+1,w-16,7,3.5);ctx.fill();
  ctx.fillStyle=col;ctx.beginPath();ctx.arc(x+1,y+4.5,3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+w-1,y+4.5,3,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#5080b0';ctx.lineWidth=1.1;
  rrect(ctx,x,y,w,9,4.5);ctx.stroke();
  // turrets
  ctx.fillStyle='#303848';ctx.strokeStyle='#5080b0';ctx.lineWidth=.7;
  rrect(ctx,x+w*.35,y-4,5,4,1);ctx.fill();ctx.stroke();
  rrect(ctx,x+w*.52,y-4,5,4,1);ctx.fill();ctx.stroke();
}

function drawAXMC(ctx,cx,cy,s){
  ctx.save();ctx.translate(cx,cy);ctx.scale(s,s);
  // stock
  ctx.fillStyle='#3a4230';rrect(ctx,-46,0,26,13,3);ctx.fill();
  ctx.fillStyle='#232c1c';rrect(ctx,-44,3,12,6,2);ctx.fill();
  // receiver
  ctx.fillStyle='#484c40';rrect(ctx,-20,-3,34,16,2);ctx.fill();
  ctx.fillStyle='#555948';rrect(ctx,-18,-7,30,4,1);ctx.fill();
  // scope
  drawScope(ctx,-16,-17,1,36);
  // barrel heavy fluted
  ctx.fillStyle='#686c60';rrect(ctx,14,-1,55,9,3);ctx.fill();
  ctx.strokeStyle='#8a8e80';ctx.lineWidth=.8;rrect(ctx,14,-1,55,9,3);ctx.stroke();
  for(const ox of[20,28,36,44]){ctx.fillStyle='#545850';rrect(ctx,ox,-1,5,3,1);ctx.fill();}
  // muzzle brake
  ctx.fillStyle='#7a7e72';rrect(ctx,67,-3,8,13,2);ctx.fill();
  ctx.strokeStyle='#9a9e90';ctx.lineWidth=.6;rrect(ctx,67,-3,8,13,2);ctx.stroke();
  ctx.strokeStyle='#606460';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(69,-2);ctx.lineTo(69,10);ctx.stroke();
  ctx.beginPath();ctx.moveTo(72,-2);ctx.lineTo(72,10);ctx.stroke();
  // magazine
  ctx.fillStyle='#303428';rrect(ctx,-14,13,14,14,2.5);ctx.fill();
  ctx.strokeStyle='#5a5e50';ctx.lineWidth=.8;rrect(ctx,-14,13,14,14,2.5);ctx.stroke();
  // bolt handle
  ctx.strokeStyle='#8a8e80';ctx.lineWidth=2.5;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(4,-3);ctx.lineTo(9,-9);ctx.stroke();
  ctx.fillStyle='#a0a498';ctx.beginPath();ctx.arc(9,-10,3.5,0,Math.PI*2);ctx.fill();
  // bipod
  ctx.strokeStyle='#6a6e60';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(20,8);ctx.lineTo(15,22);ctx.stroke();
  ctx.beginPath();ctx.moveTo(28,8);ctx.lineTo(33,22);ctx.stroke();
  ctx.strokeStyle='#5a5e54';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(13,22);ctx.lineTo(17,22);ctx.stroke();
  ctx.beginPath();ctx.moveTo(31,22);ctx.lineTo(35,22);ctx.stroke();
  ctx.restore();
}

function drawMRAD(ctx,cx,cy,s){
  ctx.save();ctx.translate(cx,cy);ctx.scale(s,s);
  // folding stock
  ctx.fillStyle='#2a3028';rrect(ctx,-46,2,24,11,3);ctx.fill();
  ctx.strokeStyle='#485840';ctx.lineWidth=.8;rrect(ctx,-46,2,24,11,3);ctx.stroke();
  // hinge
  ctx.fillStyle='#686860';ctx.beginPath();ctx.arc(-22,7.5,4,0,Math.PI*2);ctx.fill();
  // receiver
  ctx.fillStyle='#303830';rrect(ctx,-18,-2,32,15,2);ctx.fill();
  // rail
  ctx.fillStyle='#404840';rrect(ctx,-16,-6,28,5,1);ctx.fill();
  for(const ox of[-14,-9,-4,1,6]){ctx.fillStyle='#2a3028';rrect(ctx,ox,-6,3,5,0);ctx.fill();}
  // scope
  drawScope(ctx,-15,-16,1,34,'#1a2020');
  // barrel
  ctx.fillStyle='#585c50';rrect(ctx,14,-1,52,8,3);ctx.fill();
  ctx.strokeStyle='#787c70';ctx.lineWidth=.7;rrect(ctx,14,-1,52,8,3);ctx.stroke();
  // muzzle brake (MRAD style)
  ctx.fillStyle='#686a60';rrect(ctx,64,-3,9,12,2);ctx.fill();
  for(let i=0;i<3;i++){ctx.strokeStyle='#484a40';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(65+i*2,-2);ctx.lineTo(65+i*2,9);ctx.stroke();}
  // magazine
  ctx.fillStyle='#282e26';rrect(ctx,-12,13,18,15,2.5);ctx.fill();
  ctx.strokeStyle='#485040';ctx.lineWidth=.7;rrect(ctx,-12,13,18,15,2.5);ctx.stroke();
  // bolt
  ctx.strokeStyle='#888880';ctx.lineWidth=2.5;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(2,-2);ctx.lineTo(7,-8);ctx.stroke();

/* ══════════════════════════════════════════════
   AUDIO
══════════════════════════════════════════════ */
let audioCtx=null;
function ga(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playRifleShot(recoil){
  try{
    const a=ga();
    // crack / shockwave
    const buf=a.createBuffer(1,a.sampleRate*.15,a.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++){const t=i/a.sampleRate;d[i]=(Math.random()*2-1)*Math.exp(-t*22)*recoil;}
    const src=a.createBufferSource();src.buffer=buf;
    const g=a.createGain();g.gain.setValueAtTime(recoil*.8,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.2);
    const f=a.createBiquadFilter();f.type='bandpass';f.frequency.value=900;f.Q.value=.5;
    src.connect(f);f.connect(g);g.connect(a.destination);src.start();
    // sub boom
    const osc=a.createOscillator();const og=a.createGain();
    osc.frequency.setValueAtTime(60+recoil*20,a.currentTime);
    osc.frequency.exponentialRampToValueAtTime(20,a.currentTime+.3);
    og.gain.setValueAtTime(recoil*.5,a.currentTime);
    og.gain.exponentialRampToValueAtTime(.001,a.currentTime+.4);
    osc.connect(og);og.connect(a.destination);osc.start();osc.stop(a.currentTime+.4);
  }catch(e){}
}
function playHit(){
  try{
    const a=ga();
    const buf=a.createBuffer(1,a.sampleRate*.05,a.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/d.length*18)*.5;
    const src=a.createBufferSource();src.buffer=buf;
    const f=a.createBiquadFilter();f.type='bandpass';f.frequency.value=3000;
    const g=a.createGain();g.gain.value=.4;
    src.connect(f);f.connect(g);g.connect(a.destination);src.start();
  }catch(e){}
}

/* ══════════════════════════════════════════════
   ENVIRONMENT
══════════════════════════════════════════════ */
function drawEnvironment(){
  // Draw the mountain landscape photo as backdrop
  if(_bgLoaded){
    // Fill entire canvas with the image, maintaining aspect ratio (cover)
    const imgAR = _bgImg.width / _bgImg.height;
    const canAR = W / H;
    let sx=0,sy=0,sw=_bgImg.width,sh=_bgImg.height;
    if(imgAR > canAR){
      // image wider than canvas — crop sides
      sw = _bgImg.height * canAR;
      sx = (_bgImg.width - sw) / 2;
    } else {
      // image taller than canvas — crop bottom
      sh = _bgImg.width / canAR;
      sy = 0;
    }
    rctx.drawImage(_bgImg, sx, sy, sw, sh, 0, 0, W, H);
    // Subtle dark vignette at edges for range atmosphere
    const vig = rctx.createRadialGradient(W/2,H/2,H*.2,W/2,H/2,W*.8);
    vig.addColorStop(0,'rgba(0,0,0,0)');
    vig.addColorStop(1,'rgba(0,0,0,.35)');
    rctx.fillStyle=vig;rctx.fillRect(0,0,W,H);
    // Slight cool tint for range realism
    rctx.fillStyle='rgba(10,20,40,.08)';rctx.fillRect(0,0,W,H);
  } else {
    // Fallback solid while image loads
    rctx.fillStyle='#4a6a8a';rctx.fillRect(0,0,W,H);
  }
}

══════════════════════════════════════════════ */


function rrect2(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

   BULLET HOLES
══════════════════════════════════════════════ */
function drawHoles(){
  G.holes.forEach(h=>{
    const age=(Date.now()-h.born)/1000;
    rctx.save();
    // spall mark
    rctx.fillStyle='rgba(200,180,100,.15)';
    rctx.beginPath();rctx.arc(h.x,h.y,8,0,Math.PI*2);rctx.fill();
    // hole
    rctx.fillStyle='#050c08';
    rctx.beginPath();rctx.arc(h.x,h.y,3.5,0,Math.PI*2);rctx.fill();
    // rim
    rctx.strokeStyle='rgba(180,160,80,.5)';rctx.lineWidth=1.5;
    rctx.beginPath();rctx.arc(h.x,h.y,5,0,Math.PI*2);rctx.stroke();
    // score popup
    if(age<2.5){
      const a=Math.max(0,1-age/2.5);
      rctx.globalAlpha=a;
      rctx.font=`bold ${h.pts>=8?18:14}px Bebas Neue`;
      rctx.fillStyle=h.pts>=10?'#e8c040':h.pts>=8?'#5090d8':'#888';
      rctx.textAlign='center';
      rctx.fillText(h.pts>=10?`HIT +${h.pts}`:`+${h.pts}`,h.x,h.y-22-age*40);
    }
    rctx.restore();
  });
}

══════════════════════════════════════════════ */
function drawFloats(){
  G.floats=G.floats.filter(f=>{
    const age=(Date.now()-f.born)/1000;if(age>2)return false;
    const a=Math.max(0,1-age/2);
    rctx.save();rctx.globalAlpha=a;
    rctx.font=`${f.sz||16}px Bebas Neue`;
    rctx.fillStyle=f.col||'#5090d8';rctx.textAlign='center';
    rctx.fillText(f.text,f.x,f.y-age*44);
    rctx.restore();return true;
  });
}

   MUZZLE FLASH
══════════════════════════════════════════════ */
function drawMuzzle(){
  if(G.muzzle<=0)return;
  const mx=W*.5,my=H*.87;
  rctx.save();rctx.globalAlpha=G.muzzle;
  const mg=rctx.createRadialGradient(mx,my,0,mx,my,W*.1);
  mg.addColorStop(0,'rgba(255,240,160,.95)');
  mg.addColorStop(.35,'rgba(255,140,30,.6)');
  mg.addColorStop(1,'rgba(0,0,0,0)');
  rctx.fillStyle=mg;
  rctx.beginPath();rctx.arc(mx,my,Math.max(0.001,W*.1),0,Math.PI*2);rctx.fill();
  rctx.restore();
  G.muzzle-=.18;
}

/* ══════════════════════════════════════════════
   SCOPE OVERLAY
══════════════════════════════════════════════ */
let rifleAimLocked = false;   // true after finger lift, waiting for fire tap
let rifleLockedMx = 0, rifleLockedMy = 0;   // locked aim coordinates

function drawScopeView(){
  sc.width=W;sc.height=H;
  // Scope always active during round — no target proximity check needed
  G.scopeActive=G.roundActive;
  const scopeEl=document.getElementById('scopeOverlay');
  if(!G.roundActive){scopeEl.classList.remove('visible');return;}
  scopeEl.classList.add('visible');

  // Use locked coordinates when waiting for tap, otherwise follow finger
  const cx = rifleAimLocked ? rifleLockedMx : G.mx;
  const cy = rifleAimLocked ? rifleLockedMy : G.my;
  const r=80; // scope radius

  sctx.clearRect(0,0,W,H);
  // Just a thin rim around the scope circle
  sctx.strokeStyle='rgba(60,80,100,.8)';sctx.lineWidth=6;
  sctx.beginPath();sctx.arc(cx,cy,r+3,0,Math.PI*2);sctx.stroke();

  // scope glass tint
  sctx.save();
  sctx.beginPath();sctx.arc(cx,cy,Math.max(0.001,r),0,Math.PI*2);sctx.clip();
  sctx.fillStyle='rgba(20,40,60,.25)';sctx.fillRect(cx-r,cy-r,r*2,r*2);

  // MIL-DOT reticle
  sctx.strokeStyle='rgba(180,220,255,.85)';sctx.lineWidth=1;
  // crosshair
  sctx.beginPath();sctx.moveTo(cx-r,cy);sctx.lineTo(cx-12,cy);sctx.stroke();
  sctx.beginPath();sctx.moveTo(cx+12,cy);sctx.lineTo(cx+r,cy);sctx.stroke();
  sctx.beginPath();sctx.moveTo(cx,cy-r);sctx.lineTo(cx,cy-12);sctx.stroke();
  sctx.beginPath();sctx.moveTo(cx,cy+12);sctx.lineTo(cx,cy+r);sctx.stroke();
  // center dot
  sctx.fillStyle='rgba(180,220,255,.9)';
  sctx.beginPath();sctx.arc(cx,cy,2,0,Math.PI*2);sctx.fill();
  // mil dots
  for(const off of[-40,-20,20,40]){
    sctx.fillStyle='rgba(180,220,255,.7)';
    sctx.beginPath();sctx.arc(cx+off,cy,2,0,Math.PI*2);sctx.fill();
    sctx.beginPath();sctx.arc(cx,cy+off,2,0,Math.PI*2);sctx.fill();
  }
  // wind holdoff indicator
  const windOffset=(G.windSpeed*Math.cos(G.windAngle))*1.2;
  sctx.strokeStyle='rgba(255,220,80,.4)';sctx.lineWidth=1;sctx.setLineDash([2,4]);
  sctx.beginPath();sctx.moveTo(cx,cy);sctx.lineTo(cx+windOffset,cy);sctx.stroke();
  sctx.setLineDash([]);
  if(Math.abs(windOffset)>4){
    sctx.fillStyle='rgba(255,220,80,.5)';
    sctx.beginPath();sctx.arc(cx+windOffset,cy,2.5,0,Math.PI*2);sctx.fill();
  }
  sctx.restore();

  // rangefinder display
  drawRangefinder(cx,cy,r);
  // scope rim
  sctx.strokeStyle='rgba(40,60,90,.9)';sctx.lineWidth=8;
  sctx.beginPath();sctx.arc(cx,cy,Math.max(0.001,r),0,Math.PI*2);sctx.stroke();
  sctx.strokeStyle='rgba(80,120,160,.4)';sctx.lineWidth=2;
  sctx.beginPath();sctx.arc(cx,cy,Math.max(0.001,r-4),0,Math.PI*2);sctx.stroke();

  // Long-press hold indicator ring (mobile only)
  if(typeof _touchHoldMs!=='undefined'&&_touchHoldMs>0&&typeof LONG_PRESS_MS!=='undefined'){
    const prog=Math.min(1,_touchHoldMs/LONG_PRESS_MS);
    const arcColor=prog<0.7?`rgba(255,200,40,${0.5+prog*0.4})`:`rgba(255,80,30,${0.7+prog*0.3})`;
    sctx.strokeStyle=arcColor; sctx.lineWidth=4;
    sctx.beginPath();sctx.arc(cx,cy,r+10,-Math.PI/2,-Math.PI/2+prog*Math.PI*2);sctx.stroke();
    // Label
    if(prog>0.15){
      sctx.fillStyle=arcColor; sctx.font='bold 11px Oswald'; sctx.textAlign='center';
      sctx.fillText(prog>=1?'FIRE!':'HOLD'+(Math.round(prog*100)+'%'),cx,cy+r+26);
    }
  }
}

/* ══════════════════════════════════════════════
   STANDARD CROSSHAIR (when scope not active)
══════════════════════════════════════════════ */
function drawCrosshair(){
  if(!G.roundActive||G.scopeActive)return;
  // Use locked coords if waiting for tap, otherwise follow finger
  const cx = rifleAimLocked ? rifleLockedMx : G.mx;
  const cy = rifleAimLocked ? rifleLockedMy : G.my;
  const sp=G.curRifle?(1-G.curRifle.spread)*18:8;
  rctx.save();
  rctx.strokeStyle='rgba(80,144,216,.75)';rctx.lineWidth=1.2;
  rctx.beginPath();rctx.arc(cx,cy,Math.max(0.001,16+sp),0,Math.PI*2);rctx.stroke();
  [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dx,dy])=>{
    rctx.beginPath();rctx.moveTo(cx+dx*(20+sp),cy+dy*(20+sp));
    rctx.lineTo(cx+dx*(32+sp),cy+dy*(32+sp));rctx.stroke();
  });
  rctx.fillStyle='rgba(80,144,216,.8)';
  rctx.beginPath();rctx.arc(cx,cy,2,0,Math.PI*2);rctx.fill();
  rctx.restore();
}

/* ══════════════════════════════════════════════
   MAIN RENDER LOOP
══════════════════════════════════════════════ */
let lastT=0;
function loop(t){
  const dt=Math.min((t-lastT)/1000,.05);lastT=t;
  rctx.clearRect(0,0,W,H);
  drawEnvironment();
  if(G.roundActive){ updateAnimals(dt); drawAnimals(); }
  updateScanDist(dt);
  drawHoles();
  drawMuzzle();
  drawCrosshair();
  drawFloats();
  G.windTimer+=dt;
  if(G.windTimer>12+Math.random()*8){
    G.windAngle+=(Math.random()-.5)*Math.PI*.5;
    G.windSpeed=Math.max(2,Math.min(20,G.windSpeed+(Math.random()-.5)*6));
    G.windTimer=0;
    updateWindHUD();
  }
  G.recoilY*=.82;G.recoilX*=.82;
  drawScopeView();
  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);

/* ══════════════════════════════════════════════
   INTERACTION — SLIDE TO AIM, LIFT TO LOCK, TAP TO FIRE
══════════════════════════════════════════════ */
const RIFLE_OFFSET_Y = 110;  // px lift above finger on mobile

function toRifleCanvas(clientX, clientY, offsetY=0){
  const r = rc.getBoundingClientRect();
  const sx = rc.width/r.width, sy = rc.height/r.height;
  return {
    x: (clientX - r.left) * sx,
    y: (clientY - r.top)  * sy - offsetY * sy
  };
}

function lockRifleAim(){
  if(!G.roundActive) return;
  // Store the current aim position as locked
  rifleLockedMx = G.mx;
  rifleLockedMy = G.my;
  rifleAimLocked = true;
  // Show fire hint
  const hint = document.getElementById('fireHint');
  if(hint){ hint.textContent='TAP TO FIRE'; hint.classList.add('visible'); }
}

function fireRifleLocked(){
  if(!rifleAimLocked || !G.roundActive) return;
  rifleAimLocked = false;
  const hint = document.getElementById('fireHint');
  if(hint) hint.classList.remove('visible');
  // Fire using the locked coordinates
  fire(rifleLockedMx, rifleLockedMy);
}

// ── MOUSE ──
rc.addEventListener('mousemove', e=>{
  if(rifleAimLocked) return;  // ignore movement when locked
  const p = toRifleCanvas(e.clientX, e.clientY, 0);
  G.mx = p.x; G.my = p.y;
});
rc.addEventListener('mousedown', e=>{
  if(rifleAimLocked){ fireRifleLocked(); return; }
  // hold begins aim — nothing else needed, sight already tracks G.mx/my
});
rc.addEventListener('mouseup', e=>{
  if(!rifleAimLocked && G.roundActive) lockRifleAim();
});

// ── TOUCH ──
rc.addEventListener('touchstart', e=>{
  e.preventDefault();
  const t = e.touches[0];
  const p = toRifleCanvas(t.clientX, t.clientY, RIFLE_OFFSET_Y);
  G.mx = p.x; G.my = p.y;
  if(rifleAimLocked){ fireRifleLocked(); }
},{passive:false});

rc.addEventListener('touchend', e=>{
  e.preventDefault();
  if(!rifleAimLocked && G.roundActive) lockRifleAim();
},{passive:false});

rc.addEventListener('touchmove', e=>{
  e.preventDefault();
  if(rifleAimLocked) return;  // ignore movement when locked
  const t = e.touches[0];
  const p = toRifleCanvas(t.clientX, t.clientY, RIFLE_OFFSET_Y);
  G.mx = p.x; G.my = p.y;
},{passive:false});

function fire(px,py){
  if(!G.roundActive)return;
  const r=G.curRifle;
  HX.bigRecoil(G.curRifle?.recoil||1);
  playRifleShot(r?.recoil||1);
  triggerFlash();
  G.muzzle=1;
  const recoil=r?.recoil||1;
  G.recoilY=-(recoil*22+Math.random()*8);
  G.recoilX=(Math.random()-.5)*recoil*10;

  // Wind drift + spread: used for visual shot hole only, NOT for hit detection
  // Hit detection uses the exact click/tap coordinates — you must actually hit the animal
  const windDrift=G.windSpeed*Math.cos(G.windAngle)*1.4;
  const sp=(1-(r?.spread||.92))*45;
  const holeX=px+windDrift+(Math.random()-.5)*sp; // visual only
  const holeY=py+(Math.random()-.5)*sp;            // visual only

  // Pixel-accurate hit: use exact cursor position (px, py)
  // Each animal body is an ellipse centered ~14*sc above its y (feet) position
  let hitAnimal=null, hitDist=9999;
  for(const a of G.animals){
    if(a.hit||a.hiding||a.alpha<0.4) continue;
    const sc = (a.szScale||a.sz||0.5)*(W/900);
    // Per-type body dimensions (match drawAnimalShape local coords)
    let bHW, bHH, bOffY;
    const t=a.type||'';
    if(t==='elk'||t==='elk_ridge'){bHW=22;bHH=11;bOffY=-16;}
    else if(t==='deer'||t==='mule_deer'){bHW=16;bHH=9;bOffY=-13;}
    else if(t==='bear'){bHW=20;bHH=13;bOffY=-11;}
    else if(t==='pronghorn'){bHW=15;bHH=8;bOffY=-12;}
    else if(t==='coyote'){bHW=16;bHH=7;bOffY=-9;}
    else if(t==='bighorn'){bHW=14;bHH=9;bOffY=-13;}
    else if(t==='goat'){bHW=13;bHH=9;bOffY=-12;}
    else{bHW=16;bHH=9;bOffY=-13;}
    // Scale to screen coords
    const cx = a.x;
    const cy = a.y + bOffY*sc;
    const hw = bHW*sc;
    const hh = bHH*sc;
    // Ellipse hit test — EXACT, no padding
    const dx = px - cx;
    const dy = py - cy;
    const inside = (dx*dx)/(hw*hw) + (dy*dy)/(hh*hh) <= 1.0;
    if(!inside) continue;
    const d = Math.sqrt(dx*dx+dy*dy);
    if(d < hitDist){ hitDist=d; hitAnimal=a; }
  }
  if(hitAnimal){
    const rng = 32 * hitAnimal.sz * (W/900);
    const bullseye = hitDist < rng * 0.35;
    const pts = bullseye ? G.distPts+4 : hitDist<rng*.7 ? G.distPts+2 : G.distPts;
    G.hits++;G.streak++;if(G.streak>G.bestStreak)G.bestStreak=G.streak;
    if(G.streak>=3)HX.streak(G.streak);else HX.kill();
    const bonus=G.streak>=3?Math.floor(G.streak/3):0;
    const total=pts+bonus;G.score+=total;
    G.holes.push({x:holeX,y:holeY,pts:total,born:Date.now()});
    playHit();
    const label=bullseye?'💥 BULLSEYE +'+total:'HIT +'+total;
    G.floats.push({x:hitAnimal.x,y:hitAnimal.y-50,text:label,col:bullseye?'#ffee44':'#40ff80',sz:15,born:Date.now()});
    if(G.streak>=3) G.floats.push({x:hitAnimal.x,y:hitAnimal.y-68,text:'🔥 '+G.streak+'× STREAK',col:'#e8c040',sz:12,born:Date.now()});
    // Remove the hit animal and respawn a new one after a delay
    G.animals = G.animals.filter(a=>a!==hitAnimal);
    setTimeout(()=>{ if(G.roundActive){ const def=ANIMAL_DEFS[Math.floor(Math.random()*ANIMAL_DEFS.length)]; const dir=Math.random()<0.5?1:-1; G.animals.push({...def,x:dir>0?-80:W+80,y:H*(0.55+Math.random()*0.3),dir,frameT:0,pause:0,pauseTimer:0,walking:true,id:Date.now()}); }},3000);
  } else {
    G.misses++;G.streak=0;HX.miss();
    G.holes.push({x:holeX,y:holeY,pts:0,born:Date.now()});
    G.floats.push({x:holeX,y:holeY,text:'MISS',col:'#666',sz:14,born:Date.now()});
  }
  updateStats();
}

function aiSpawnTarget(){
  if(!G.roundActive) return;
  const p = AI_PLATES[Math.floor(Math.random()*AI_PLATES.length)];
  const margin = 0.12;
  const tx = margin + Math.random()*(1-margin*2);
  // Y range — keep targets in lower 70% of canvas (terrain area)
  const ty = 0.28 + Math.random()*0.42;
  const scale = 0.5 + Math.random()*0.5;     // size variation = distance simulation
  const distYd = Math.round(100 + (1-scale)*900); // smaller = farther
  G.targets.push({
    x: tx*W, y: ty*H,
    sz: p.sz * W * scale,
    shape: p.shape,
    pts: p.pts,
    distYd,
    label: p.label,
    born: performance.now(),
    life: 3000 + Math.random()*5000,   // 3-8 seconds visible
    alpha: 0,
    hit: false,
  });
  // schedule next spawn: 1.5 - 5 seconds
  const next = 1500 + Math.random()*3500;
  if(G.roundActive) setTimeout(aiSpawnTarget, next);
}

function aiUpdateTargets(now){
  for(let i=G.targets.length-1;i>=0;i--){
    const t = G.targets[i];
    const age = now - t.born;
    if(t.hit){ t.alpha = Math.max(0, t.alpha - 0.06); if(t.alpha<=0){G.targets.splice(i,1);} continue; }
    // fade in
    if(age < 400) t.alpha = age/400;
    // fade out near end
    else if(age > t.life - 400) t.alpha = Math.max(0,(t.life-age)/400);
    else t.alpha = 1;
    // expire
    if(age >= t.life){ G.targets.splice(i,1); }
  }
}

function aiDrawTargets(){
  G.closestDist = 9999;
  G.closestAngle = 0;
  for(const t of G.targets){
    if(t.alpha <= 0) continue;
    rctx.save();
    rctx.globalAlpha = t.alpha;
    const sz = t.sz;
    const x=t.x, y=t.y;
    // steel plate shadow
    rctx.fillStyle='rgba(0,0,0,0.4)';
    rctx.fillRect(x-sz/2+3,y-sz/2+3,sz,sz);
    // steel plate
    rctx.fillStyle = t.hit ? '#c0392b' : '#8aabb0';
    rctx.strokeStyle='rgba(255,255,255,0.3)';
    rctx.lineWidth=1;
    rctx.beginPath();
    if(t.shape==='circle'){ rctx.arc(x,y,sz/2,0,Math.PI*2); }
    else if(t.shape==='diamond'){
      rctx.moveTo(x,y-sz/2); rctx.lineTo(x+sz/2,y);
      rctx.lineTo(x,y+sz/2); rctx.lineTo(x-sz/2,y); rctx.closePath();
    } else {
      rctx.rect(x-sz/2, y-sz/2, sz, sz);
    }
    rctx.fill(); rctx.stroke();
    // range label
    rctx.fillStyle='rgba(255,255,255,0.85)';
    rctx.font=`bold ${Math.max(8,sz*0.3)}px Oswald,sans-serif`;
    rctx.textAlign='center';
    rctx.fillText(t.distYd+'yd', x, y+sz/2+14);
    rctx.restore();
    // track closest to crosshair
    const dx=G.mx-x, dy=G.my-y;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d < G.closestDist){ G.closestDist=d; G.closestAngle=Math.atan2(dy,dx); }
  }
}

/* ── TERRAIN ZONE Y-RANGES (fraction of canvas height) ──
   ridge:  0.15 – 0.40  (high on mountains/peaks)

   valley: 0.60 – 0.82  (valley floor, foreground)
   All animals have Y position adjusted so feet are on terrain
──────────────────────────────────────────────────────── */
const ZONES = {
  ridge:  {yMin:0.34, yMax:0.48, distMult:3.5},
  slope:  {yMin:0.50, yMax:0.64, distMult:2.0},
  valley: {yMin:0.66, yMax:0.78, distMult:1.0},
};

/* Speed tiers */
const SPEED_TIERS = ['slow','med','fast'];

function spawnAnimals(){
  G.animals=[];
  // Place animals across terrain zones
  const counts = {ridge:3+Math.floor(Math.random()*2), slope:3+Math.floor(Math.random()*2), valley:2+Math.floor(Math.random()*2)};
  let id=0;
  for(const [zone, count] of Object.entries(counts)){
    const zoneDefs = ANIMAL_DEFS.filter(d=>d.zone===zone||d.zone===zone);
    const zoneInfo = ZONES[zone];
    for(let i=0;i<count;i++){
      const def = zoneDefs[Math.floor(Math.random()*zoneDefs.length)] || ANIMAL_DEFS[0];
      const tier = SPEED_TIERS[Math.floor(Math.random()*3)];
      const dir = Math.random()<0.5?1:-1;
      const spd = def.spd[tier];
      const yFrac = zoneInfo.yMin + Math.random()*(zoneInfo.yMax-zoneInfo.yMin);
      const xFrac = 0.05 + Math.random()*0.9;
      const distScale = {ridge:0.18, slope:0.28, valley:0.50}[zone];
      const exposedTime = 5000 + Math.random()*5000; // 5-10 sec visible
      const hideTime = 4000 + Math.random()*6000;    // 4-10 sec hidden
      G.animals.push({
        ...def, id:id++,
        x: xFrac*W,
        y: yFrac*H - 5,  // slight adjustment to ensure feet touch ground
        dir,
        spd: spd*(W/800)*def.sz*distScale,
        szScale: def.sz * distScale,
        speedTier: tier,
        zone,
        frameT: Math.random()*Math.PI*2,
        walking: Math.random()>0.25,
        pause:0, pauseTimer:0,
        visible:true,
        exposedTimer:0,
        exposedMax: exposedTime,
        hideMax: hideTime,
        hiding:false,
        alpha:1,
      });
    }
  }
}

function updateAnimals(dt){
  const dtMs = dt*1000;
  for(const a of G.animals){
    if(a.hit) continue;
    a.frameT += dt*3;

    // ── Appear/disappear cycle ──
    if(!a.hiding){
      a.exposedTimer += dtMs;
      a.alpha = Math.min(1, a.alpha + dt*3);
      if(a.exposedTimer >= a.exposedMax){
        a.hiding=true; a.exposedTimer=0;
        a.hideTimer=0;
      }
    } else {
      a.hideTimer = (a.hideTimer||0) + dtMs;
      a.alpha = Math.max(0, a.alpha - dt*2.5);
      if(a.hideTimer >= a.hideMax){
        a.hiding=false; a.hideTimer=0;
        // Reposition to new spot, always feet on ground
        const z = ZONES[a.zone]||ZONES.valley;
        a.x = (0.05+Math.random()*0.9)*W;
        a.y = (z.yMin+Math.random()*(z.yMax-z.yMin))*H - 5;
        a.dir = Math.random()<0.5?1:-1;
        a.walking = Math.random()>0.3;
        a.exposedMax = 5000+Math.random()*5000;
        a.hideMax = 4000+Math.random()*6000;
        a.alpha=0;
      }
      continue;
    }

    // ── Realistic movement with leg animation ──
    if(a.pause>0){
      a.pauseTimer+=dtMs;
      if(a.pauseTimer>=a.pause){a.pause=0;a.pauseTimer=0;a.walking=true;}
      continue;
    }
    if(!a.walking) continue;
    a.x += a.dir * a.spd;
    // Pause chance
    const pauseChance = a.speedTier==='fast'?0.0005 : a.speedTier==='med'?0.001 : 0.002;
    if(Math.random()<pauseChance){a.walking=false;a.pause=800+Math.random()*3000;}
    // Wrap at edges
    const z = ZONES[a.zone]||ZONES.valley;
    if(a.dir>0 && a.x>W+100){a.x=-60; a.y = (z.yMin+Math.random()*(z.yMax-z.yMin))*H - 5; }
    if(a.dir<0 && a.x<-100){a.x=W+60; a.y = (z.yMin+Math.random()*(z.yMax-z.yMin))*H - 5; }
  }
}

function drawAnimalShape(ctx, a){
  if(!a.visible && a.alpha<=0) return;
  const scale = a.szScale * (W/900);
  const flip = a.dir<0;
  const walk = a.walking && !a.hiding;
  // Leg phase — front legs move opposite to back for realistic gait
  const legPhase = walk ? Math.sin(a.frameT*2)*0.8 : 0;
  const c = a.color, acc = a.accentColor;
  const type = a.type;

  ctx.save();
  ctx.globalAlpha = a.alpha;
  ctx.translate(a.x, a.y);
  ctx.scale(flip ? -scale : scale, scale);

  // Shadow (ground contact)
  ctx.save(); ctx.scale(1,0.2);
  ctx.beginPath(); ctx.ellipse(0,22,18,6,0,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.2)'; ctx.fill(); ctx.restore();

  // ===== ELK =====
  if(type==='elk' || type==='elk_ridge'){
    // Body
    ctx.fillStyle=c;
    ctx.beginPath(); ctx.ellipse(0,-16,22,11,0,0,Math.PI*2); ctx.fill();
    // Neck/mane
    ctx.fillStyle=acc;
    ctx.beginPath(); ctx.ellipse(-12,-25,7,10,-0.3,0,Math.PI*2); ctx.fill();
    // Rump patch
    ctx.fillStyle='#c8a060';
    ctx.beginPath(); ctx.ellipse(14,-13,8,7,0,0,Math.PI*2); ctx.fill();
    // Head
    ctx.fillStyle=acc;
    ctx.beginPath(); ctx.ellipse(-19,-31,7,5,0,0,Math.PI*2); ctx.fill();
    // Snout
    ctx.fillStyle='#3a2010';
    ctx.beginPath(); ctx.ellipse(-24,-30,4,3,0,0,Math.PI*2); ctx.fill();
    // Eye
    ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(-20,-33,1.2,0,Math.PI*2); ctx.fill();
    // Antlers
    if(a.hasAntlers){
      ctx.strokeStyle=acc; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(-17,-34); ctx.lineTo(-22,-46); ctx.lineTo(-17,-43); ctx.lineTo(-27,-52); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(-14,-34); ctx.lineTo(-10,-46); ctx.lineTo(-6,-42); ctx.stroke();
    }
    // Legs — realistic walking cycle
    ctx.strokeStyle=c; ctx.lineWidth=3;
    const legOffsets = [-10,-3,6,13];
    legOffsets.forEach((ox,i)=>{
      // Front legs (first two) move opposite to back legs (last two)
      const legShift = (i < 2) ? legPhase : -legPhase;
      const legY = 18 + legShift*8;
      ctx.beginPath(); ctx.moveTo(ox,-4); ctx.lineTo(ox, legY); ctx.stroke();
      // Hoof
      ctx.strokeStyle='#1a0a00'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(ox, legY); ctx.lineTo(ox+2, legY+4); ctx.stroke();
      ctx.strokeStyle=c; ctx.lineWidth=3;
    });

  // ===== MULE DEER =====
  } else if(type==='mule_deer' || type==='deer'){
    ctx.fillStyle=c;
    ctx.beginPath(); ctx.ellipse(0,-13,16,9,0,0,Math.PI*2); ctx.fill();
    // White rump
    if(a.whiteRump){
      ctx.fillStyle='#e8e0d0';
      ctx.beginPath(); ctx.ellipse(11,-11,6,6,0,0,Math.PI*2); ctx.fill();
    }
    // Neck+head
    ctx.fillStyle=c;
    ctx.beginPath(); ctx.ellipse(-12,-20,5,8,-0.2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=acc;
    ctx.beginPath(); ctx.ellipse(-18,-25,6,4,0,0,Math.PI*2); ctx.fill();
    // Snout
    ctx.fillStyle='#3a2010';
    ctx.beginPath(); ctx.ellipse(-23,-24,3,2.5,0,0,Math.PI*2); ctx.fill();
    // Eye
    ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(-18,-27,1,0,Math.PI*2); ctx.fill();
    // Antlers (simplified)
    ctx.strokeStyle='#6a4020'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(-16,-27); ctx.lineTo(-18,-36); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-18,-36); ctx.lineTo(-14,-40); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-13,-27); ctx.lineTo(-10,-35); ctx.stroke();
    // Tail
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.ellipse(14,-10,4,5,0,0,Math.PI*2); ctx.fill();
    // Legs
    ctx.strokeStyle=acc; ctx.lineWidth=2;
    const legOffsets = [-7,-1,5,11];
    legOffsets.forEach((ox,i)=>{
      const legShift = (i < 2) ? legPhase : -legPhase;
      const legY = 15 + legShift*6;
      ctx.beginPath(); ctx.moveTo(ox,-2); ctx.lineTo(ox, legY); ctx.stroke();
      // Hoof
      ctx.strokeStyle='#1a0a00'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(ox, legY); ctx.lineTo(ox+2, legY+4); ctx.stroke();
      ctx.strokeStyle=acc; ctx.lineWidth=2;
    });

  // ===== BEAR =====
  } else if(type==='bear'){
    ctx.fillStyle=c;
    ctx.beginPath(); ctx.ellipse(0,-11,20,13,0,0,Math.PI*2); ctx.fill();
    // Head
    ctx.fillStyle='#1a1008';
    ctx.beginPath(); ctx.arc(-16,-22,9,0,Math.PI*2); ctx.fill();
    // Snout
    ctx.fillStyle='#3a2a18';
    ctx.beginPath(); ctx.ellipse(-22,-22,6,4,0,0,Math.PI*2); ctx.fill();
    // Nose
    ctx.fillStyle='#000';
    ctx.beginPath(); ctx.ellipse(-25,-22,2.5,2,0,0,Math.PI*2); ctx.fill();
    // Ears
    ctx.fillStyle=c;
    ctx.beginPath(); ctx.arc(-10,-30,3.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(-17,-30,3.5,0,Math.PI*2); ctx.fill();
    // Legs — bear waddle
    ctx.strokeStyle=c; ctx.lineWidth=5;
    const legOffsets = [-10,-3,6,13];
    legOffsets.forEach((ox,i)=>{
      const legShift = (i < 2) ? legPhase*0.5 : -legPhase*0.5;
      const legY = 14 + legShift*6;
      ctx.beginPath(); ctx.moveTo(ox,-2); ctx.lineTo(ox, legY); ctx.stroke();
      // Paw
      ctx.fillStyle='#3a2a18';
      ctx.beginPath(); ctx.ellipse(ox, legY, 3, 2, 0, 0, Math.PI*2); ctx.fill();
    });

  // ===== PRONGHORN =====
  } else if(type==='pronghorn'){
    ctx.fillStyle=c;
    ctx.beginPath(); ctx.ellipse(0,-12,15,8,0,0,Math.PI*2); ctx.fill();
    // White patches
    ctx.fillStyle='#e8e0c0';
    ctx.beginPath(); ctx.ellipse(8,-10,5,4,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(-2,-6,4,3,0,0,Math.PI*2); ctx.fill();
    // Neck+head
    ctx.fillStyle=c;
    ctx.beginPath(); ctx.ellipse(-11,-19,5,7,-0.15,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#8a6030';
    ctx.beginPath(); ctx.ellipse(-17,-23,5,3.5,0,0,Math.PI*2); ctx.fill();
    // Black face mask
    ctx.fillStyle='#1a0a00';
    ctx.beginPath(); ctx.ellipse(-20,-23,2.5,2,0,0,Math.PI*2); ctx.fill();
    // Horns
    ctx.strokeStyle='#2a1800'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(-14,-26); ctx.lineTo(-13,-38); ctx.lineTo(-9,-34); ctx.stroke();
    // Legs — fast running gait
    ctx.strokeStyle=acc; ctx.lineWidth=1.8;
    const legOffsets = [-6,-1,5,10];
    legOffsets.forEach((ox,i)=>{
      const legShift = (i < 2) ? legPhase*1.2 : -legPhase*1.2;
      const legY = 13 + legShift*9;
      ctx.beginPath(); ctx.moveTo(ox,-1); ctx.lineTo(ox, legY); ctx.stroke();
      // Hoof
      ctx.strokeStyle='#1a0a00'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(ox, legY); ctx.lineTo(ox+2, legY+4); ctx.stroke();
      ctx.strokeStyle=acc; ctx.lineWidth=1.8;
    });

  // ===== COYOTE =====
  } else if(type==='coyote'){
    ctx.fillStyle=c;
    ctx.beginPath(); ctx.ellipse(0,-9,16,7,0,0,Math.PI*2); ctx.fill();
    // Head
    ctx.fillStyle=acc;
    ctx.beginPath(); ctx.ellipse(-13,-16,8,5,0.1,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#c8a868';
    ctx.beginPath(); ctx.ellipse(-19,-15,5,3,-0.1,0,Math.PI*2); ctx.fill();
    // Ears
    ctx.fillStyle=c;
    ctx.beginPath(); ctx.moveTo(-10,-21); ctx.lineTo(-7,-28); ctx.lineTo(-4,-21); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-15,-21); ctx.lineTo(-13,-28); ctx.lineTo(-10,-21); ctx.closePath(); ctx.fill();
    // Eye
    ctx.fillStyle='#c8a800'; ctx.beginPath(); ctx.arc(-13,-18,1.2,0,Math.PI*2); ctx.fill();
    // Tail
    ctx.strokeStyle=c; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(16,-8); ctx.quadraticCurveTo(26,-4,22,6); ctx.stroke();
    // Legs
    ctx.strokeStyle=acc; ctx.lineWidth=1.8;
    const legOffsets = [-7,-2,4,10];
    legOffsets.forEach((ox,i)=>{
      const legShift = (i < 2) ? legPhase*1.1 : -legPhase*1.1;
      const legY = 11 + legShift*7;
      ctx.beginPath(); ctx.moveTo(ox,-1); ctx.lineTo(ox, legY); ctx.stroke();
    });

  // ===== BIGHORN SHEEP =====
  } else if(type==='bighorn'){
    ctx.fillStyle=c;
    ctx.beginPath(); ctx.ellipse(0,-13,14,9,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#d8c898';
    ctx.beginPath(); ctx.ellipse(9,-11,4,4,0,0,Math.PI*2); ctx.fill();
    // Head
    ctx.fillStyle=acc;
    ctx.beginPath(); ctx.arc(-12,-21,6,0,Math.PI*2); ctx.fill();
    // Eye
    ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(-13,-22,1,0,Math.PI*2); ctx.fill();
    // Curved horns
    ctx.strokeStyle='#7a5828'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(-10,-24,9,-Math.PI*.85,Math.PI*.15); ctx.stroke();
    ctx.beginPath(); ctx.arc(-15,-24,9,-Math.PI*.85,Math.PI*.15); ctx.stroke();
    // Legs
    ctx.strokeStyle=acc; ctx.lineWidth=2;
    const legOffsets = [-7,-1,4,9];
    legOffsets.forEach((ox,i)=>{
      const legShift = (i < 2) ? legPhase*0.8 : -legPhase*0.8;
      const legY = 13 + legShift*5;
      ctx.beginPath(); ctx.moveTo(ox,-3); ctx.lineTo(ox, legY); ctx.stroke();
    });

  // ===== MOUNTAIN GOAT =====
  } else if(type==='goat'){
    ctx.fillStyle='#ece8e0';
    ctx.beginPath(); ctx.ellipse(0,-12,13,9,0,0,Math.PI*2); ctx.fill();
    // Shaggy outline
    ctx.strokeStyle='#d8d0c0'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.ellipse(0,-12,14,10,0,0,Math.PI*2); ctx.stroke();
    // Head
    ctx.fillStyle='#e8e4dc';
    ctx.beginPath(); ctx.arc(-11,-20,6,0,Math.PI*2); ctx.fill();
    // Snout
    ctx.fillStyle='#c8c0b0';
    ctx.beginPath(); ctx.ellipse(-16,-19,3.5,2.5,0,0,Math.PI*2); ctx.fill();
    // Small black horns
    ctx.strokeStyle='#2a2018'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(-9,-25); ctx.lineTo(-7,-31); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-12,-25); ctx.lineTo(-14,-31); ctx.stroke();
    // Beard
    ctx.fillStyle='#d8d0c0';
    ctx.beginPath(); ctx.ellipse(-14,-16,2,4,0,0,Math.PI*2); ctx.fill();
    // Legs — sturdy rock climbers
    ctx.strokeStyle='#c0b8a8'; ctx.lineWidth=2.5;
    const legOffsets = [-7,-1,4,9];
    legOffsets.forEach((ox,i)=>{
      const legShift = (i < 2) ? legPhase*0.6 : -legPhase*0.6;
      const legY = 14 + legShift*4;
      ctx.beginPath(); ctx.moveTo(ox,-2); ctx.lineTo(ox, legY); ctx.stroke();
      // Hooves — dark
      ctx.strokeStyle='#1a1810'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(ox, legY); ctx.lineTo(ox+1, legY+3); ctx.stroke();
      ctx.strokeStyle='#c0b8a8'; ctx.lineWidth=2.5;
    });
  }

  ctx.restore();
}

function drawAnimals(){
  // Sort by Y for depth (lower Y = higher on screen = further)
  const sorted = [...G.animals].sort((a,b)=>b.y-a.y);
  for(const a of sorted){
    if(a.alpha<=0) continue;
    drawAnimalShape(rctx, a);
    // Label above animal
    if(a.alpha>0.6){
      rctx.save();
      rctx.globalAlpha=a.alpha*0.8;
      const fs=Math.max(7, Math.round(7*a.szScale*(W/900)+5));
      rctx.font=`${fs}px 'Oswald',sans-serif`;
      rctx.fillStyle='rgba(255,240,180,0.9)';
      rctx.textAlign='center';
      rctx.shadowColor='rgba(0,0,0,0.8)'; rctx.shadowBlur=3;
      rctx.fillText(a.label, a.x, a.y - Math.max(12, 28*a.szScale*(W/900)));
      rctx.restore();
    }
  }
}

/* ══════════════════════════════════════════════
   RANGEFINDER HUD (inside scope)
══════════════════════════════════════════════ */
function updateScanDist(dt){
  G.scanTick += dt;

  const safeW = Math.max(1, W);
  const safeH = Math.max(1, H);
  const mx = isNaN(G.mx) ? safeW*0.5 : G.mx;
  const my = isNaN(G.my) ? safeH*0.5 : G.my;

  // Y position → distance: sky=far, ground=near
  const yRatio = Math.max(0, Math.min(1, my / safeH));
  // Exponential depth curve matching Zion canyon photo
  let base = 1500 * Math.pow(1 - yRatio, 1.6) + 80;
  base = Math.max(80, Math.min(1500, base));

  // X factor: canyon walls at edges read slightly farther
  const xRatio = Math.abs((mx / safeW) - 0.5) * 2;
  base += xRatio * 90;

  // Closest animal proximity — if scope near an animal, clamp to its range
  let closestAnimalDist = null;
  for(const a of (G.animals||[])){
    const screenDist = Math.sqrt((mx-a.x)**2+(my-a.y)**2);
    if(screenDist < 80){
      // Estimate yards from animal's Y position
      const aYr = Math.max(0,Math.min(1, a.y/safeH));
      const aDist = Math.max(80, Math.min(1500, 1500*Math.pow(1-aYr,1.6)+80));
      if(closestAnimalDist===null || aDist < closestAnimalDist) closestAnimalDist = aDist;
    }
  }
  const target = closestAnimalDist !== null
    ? closestAnimalDist * 0.7 + base * 0.3   // snap toward animal
    : base;

  // Smooth tracking — 220 yd/s max slew rate
  const diff = target - G.scanDist;
  G.scanDist += Math.sign(diff) * Math.min(Math.abs(diff), 220 * dt);
  G.scanDist = Math.max(80, Math.min(1500, G.scanDist));

  // Flutter noise — faster pulse when near an animal
  const pulseRate = closestAnimalDist !== null ? 0.04 : 0.1;
  if(G.scanTick > pulseRate){
    G.scanNoise = (Math.random()-0.5) * (closestAnimalDist!==null ? 8 : 22);
    G.scanTick = 0;
  }
}

function drawRangefinder(cx,cy,r){
  if(!G.roundActive) return;
  sctx.save();

  const displayDist = Math.round(G.scanDist + G.scanNoise);
  const distLabel = displayDist >= 1000
    ? (displayDist/1000).toFixed(1).replace('.0','') + 'K'
    : displayDist + '';

  const fontSize = Math.round(r * 0.58);
  sctx.font = `900 ${fontSize}px 'Bebas Neue',sans-serif`;
  sctx.textAlign = 'center';
  sctx.textBaseline = 'bottom';
  sctx.shadowColor = 'rgba(0,0,0,0.9)';
  sctx.shadowBlur = 10;

  // Main yardage number — white
  sctx.fillStyle = '#ffffff';
  sctx.fillText(distLabel, cx, cy - r - 8);

  // "YD" label
  sctx.shadowBlur = 4;
  const subSize = Math.round(fontSize * 0.3);
  sctx.font = `600 ${subSize}px 'Oswald',sans-serif`;
  sctx.fillStyle = 'rgba(255,255,255,0.55)';
  sctx.fillText('YD', cx, cy - r - 8 - fontSize * 0.92);

  sctx.shadowBlur = 0;
  sctx.restore();
}


/* ══════════════════════════════════════════════
   AI-POWERED TARGETING SEQUENCER — Claude API
══════════════════════════════════════════════ */
async function fetchAISequence(){
  const dist = G.dist;
  const rifle = G.curRifle ? G.curRifle.name : 'AI AXMC';
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:800,
        system:'You are a precision rifle range AI controller. Respond ONLY with valid JSON. No markdown, no explanation.',
        messages:[{
          role:'user',
          content:`Generate a target sequence for a ${dist}-yard Zion Canyon rifle range session.
Return JSON with this exact structure:
{
  "briefing": "short tactical briefing string",
  "targets": [
    {"animal":"elk","x":0.25,"y":0.52,"dist":${dist},"moving":true,"moveDir":1,"speed":0.4,"exposed":6},
    {"animal":"deer","x":0.65,"y":0.58,"dist":${dist+50},"moving":false,"moveDir":-1,"speed":0,"exposed":8},
    {"animal":"coyote","x":0.45,"y":0.48,"dist":${dist+100},"moving":true,"moveDir":1,"speed":0.7,"exposed":4}
  ]
}
Rules:
- 3-6 targets
- animal: "elk", "deer", "coyote", or "pronghorn"  
- x: 0.1-0.9 (canvas fraction left-right)
- y: 0.4-0.75 (canvas fraction top-bottom, animals on hillside)
- dist: ${dist} to ${dist+300} yards (integers)
- moving: true/false
- moveDir: 1 or -1
- speed: 0.1-0.9 (relative movement speed)
- exposed: seconds animal is visible before hiding (3-12)
- Mix distances, positions, and behaviors for realism`
        }]
      })
    });
    const data = await resp.json();
    const raw = data.content?.[0]?.text || '{}';
    const seq = JSON.parse(raw.replace(/```json|```/g,'').trim());
    if(seq.targets && seq.targets.length){
      applyAISequence(seq);
    }
  } catch(e){
    console.warn('AI sequence fetch failed, using fallback', e);
    spawnAnimals();
  }
}

function applyAISequence(seq){
  G.aiBriefing = seq.briefing || 'Engage all targets in sequence.';
  G.animals = seq.targets.map((t,i) => ({
    id: i,
    type: t.animal || 'elk',
    x: (t.x || (0.1 + i*0.2)) * W,
    y: (t.y || (0.5 + i*0.05)) * H,
    dist: t.dist || G.dist,
    moving: !!t.moving,
    moveDir: t.moveDir || 1,
    speed: (t.speed || 0.3) * W * 0.001,
    sz: 1 - ((t.dist - G.dist) / 600),  // size by distance
    exposed: t.exposed || 6,
    timer: 0,
    alive: true,
    hit: false,
    hidden: false,
    hideTimer: 0,
    color: {elk:'#a06830',deer:'#c8955a',coyote:'#8a7a5a',pronghorn:'#b09060'}[t.animal] || '#a06830',
    accentColor: {elk:'#5a3010',deer:'#7a4e20',coyote:'#5a4e30',pronghorn:'#705030'}[t.animal] || '#5a3010',
  }));
  G.aiReady = true;
  console.log('AI sequence loaded:', G.animals.length, 'targets. Briefing:', G.aiBriefing);
}

/* ═══════════════════════════════════════════════════════
   MOBILE OPTIMIZATION JS
   - Device Pixel Ratio canvas sharpness
   - Fullscreen API
   - Orientation lock / rotate hint
═══════════════════════════════════════════════════════ */

/* ── DEVICE PIXEL RATIO — canvas sharpness ──
   Without this, Retina/AMOLED screens render blurry.
   Scale canvas by DPR then CSS scale back down.         */
function applyDPR(canvas, ctx2d){
  const dpr = window.devicePixelRatio || 1;
  if(dpr <= 1) return dpr;
  const rect = canvas.getBoundingClientRect();
  canvas.width  = rect.width  * dpr;
  canvas.height = rect.height * dpr;
  canvas.style.width  = rect.width  + 'px';
  canvas.style.height = rect.height + 'px';
  ctx2d.scale(dpr, dpr);
  return dpr;
}

/* ── FULLSCREEN ── */
function toggleFullscreen(){
  const btn = document.getElementById('fullscreenBtn');
  if(!document.fullscreenElement && !document.webkitFullscreenElement){
    const el = document.documentElement;
    if(el.requestFullscreen)       el.requestFullscreen({navigationUI:'hide'});
    else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    if(btn) btn.textContent = '⊠';
  } else {
    if(document.exitFullscreen)         document.exitFullscreen();
    else if(document.webkitExitFullscreen) document.webkitExitFullscreen();
    if(btn) btn.textContent = '⛶';
  }
}
document.addEventListener('fullscreenchange', ()=>{
  const btn = document.getElementById('fullscreenBtn');
  if(btn) btn.textContent = document.fullscreenElement ? '⊠' : '⛶';
});

/* ── ORIENTATION LOCK + ROTATE HINT ──
   Games are landscape. Show rotate hint if portrait on mobile. */
function checkOrientation(){
  const hint = document.getElementById('rotateHint');
  if(!hint) return;
  // Only show on real touch devices with small screens, not desktop preview panes
  const isMobile = ('ontouchstart' in window) && window.screen.width <= 900 && window.screen.height <= 900 && !window.frameElement; // never show in iframes/previews
  const isPortrait = window.innerHeight > window.innerWidth;
  hint.classList.toggle('show', isMobile && isPortrait);
  // Try to lock orientation (works in PWA / Capacitor)
  if(screen.orientation && screen.orientation.lock){
    screen.orientation.lock('landscape').catch(()=>{});
  }
}
window.addEventListener('resize', checkOrientation);
window.addEventListener('orientationchange', checkOrientation);
checkOrientation();

/* ═══════════════════════════════════════════════════════════════
   ADAPTIVE HAPTIC FEEDBACK ENGINE
   navigator.vibrate() — Android Chrome native
   iOS: limited but works in PWA mode
   All patterns tuned to the specific game action feel
═══════════════════════════════════════════════════════════════ */
const HX = {
  ok: ('vibrate' in navigator),
  buzz(p){ if(this.ok) try{ navigator.vibrate(p); }catch(e){} },
  tap(){        this.buzz(12); },
  doubleTap(){  this.buzz([12,40,12]); },
  hit(){        this.buzz([20,15,8]); },
  miss(){       this.buzz([6,20,6,20,6]); },
  kill(){       this.buzz([30,20,15,15,8]); },
  reload(){     this.buzz([8,30,8,30,20]); },
  dryfire(){    this.buzz([4,8,4]); },
  recoil(m){    const t=Math.round(10+(m||1)*18); this.buzz([t,8,Math.round(t*.4)]); },
  bigRecoil(m){ const t=Math.round(20+(m||1)*25); this.buzz([t,10,Math.round(t*.6),8,Math.round(t*.2)]); },
  streak(n){    const c=Math.min(n,6),p=[]; for(let i=0;i<c;i++){p.push(15+i*8);if(i<c-1)p.push(20);} this.buzz(p); },
  explosion(){  this.buzz([80,15,50,15,30,10,15]); },
  smoke(){      this.buzz([15,30,10,30,8,30,6]); },
  flash(){      this.buzz([40,5,40,5,20]); },
  clayBreak(){  this.buzz([25,10,15,8,8]); },
  clayMiss(){   this.buzz([6,25,6]); },
  bowDraw(pct){ if(pct<0.3||Math.random()>0.07)return; this.buzz([Math.round(pct*18)]); },
  bowRelease(){ this.buzz([35,8,12]); },
  bowHit(pts){  if(pts>=9)this.buzz([50,12,25]); else if(pts>=7)this.buzz([30,10,15]); else this.buzz([15,8,8]); },
  bowMiss(){    this.buzz([4,15,4,15,4]); },
  roundStart(){ this.buzz([20,30,20,30,40]); },
  roundEnd(){   this.buzz([40,20,30,20,20,20,10]); },
  grenadePrime(){this.buzz([8,20,8]); },
  grenadeThrow(){this.buzz([60,15,45,15,25,10,12]); },
  weaponSwitch(){this.buzz([8,20,12]); },
  timerWarn(){  this.buzz([20,30,20,30,20]); },
};
