<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Dovewood Capital • Digital Properties</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Josefin+Sans:wght@100;200;300;400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
    :root {
        --canvas:       #0e0f11;
        --canvas-warm:  #13110f;
        /* BRIGHTENED TEXT COLORS — much higher contrast, fully legible */
        --ink:          #ffffff;                /* pure white for primary text */
        --ink-dim:      rgba(255, 255, 255, 0.85); /* was 0.5 → now 0.85 */
        --ink-ghost:    rgba(255, 255, 255, 0.6);  /* was 0.2 → now 0.6 */
        --accent:       #dbb46e;                 /* brighter gold */
        --accent-glow:  rgba(219, 180, 110, 0.45);
        --accent-dim:   rgba(219, 180, 110, 0.8);
        --accent-soft:  rgba(219, 180, 110, 0.15);
        --line:         rgba(219, 180, 110, 0.3); /* more visible lines */
        --rule:         rgba(255, 255, 255, 0.2); /* was 0.12 → now 0.2 */
        --glass:        rgba(14, 15, 17, 0.85);
        --safe-top:     env(safe-area-inset-top, 0px);
        --safe-bottom:  env(safe-area-inset-bottom, 0px);
    }

    html { height: -webkit-fill-available; }

    * { box-sizing: border-box; }

    body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        height: -webkit-fill-available;
        background: var(--canvas);
        color: var(--ink);
        font-family: 'Josefin Sans', sans-serif;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
        perspective: 1500px;
        perspective-origin: 50% -200px;
        touch-action: none;
    }

    /* ── GRAIN TEXTURE OVERLAY ── */
    body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
        background-size: 180px 180px;
        pointer-events: none;
        z-index: 100;
        opacity: 0.65;
    }

    /* ── AMBIENT VIGNETTE ── */
    body::after {
        content: "";
        position: fixed;
        inset: 0;
        background: radial-gradient(ellipse at 50% 0%, transparent 40%, rgba(0,0,0,0.6) 100%);
        pointer-events: none;
        z-index: 2;
    }

    /* ── HIDE UNUSED ELEMENTS ── */
    #statsArray, #adminPanel, #proceedBtn, .ai-status-container,
    .control-buttons, .pause-overlay, .scroll-banner, .fade-group,
    .museum-label, .led-pinhead, #syncToast, .btn-black, .radio-group,
    .control-item, #symmetryReadout {
        display: none !important;
    }

    /* ────────────────────────────────────────────
       SCROLL CONTAINER
    ──────────────────────────────────────────── */
    .game-content {
        opacity: 1 !important;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        height: 100vh;
        height: -webkit-fill-available;
        overflow-y: auto;
        padding: calc(var(--safe-top) + 32px) 0 calc(var(--safe-bottom) + 32px);
        box-sizing: border-box;
        position: relative;
        z-index: 10;
        -webkit-overflow-scrolling: touch;
    }

    .game-content::-webkit-scrollbar { width: 2px; }
    .game-content::-webkit-scrollbar-track { background: transparent; }
    .game-content::-webkit-scrollbar-thumb { background: var(--accent-dim); border-radius: 2px; }

    /* ────────────────────────────────────────────
       MASTHEAD BLOCK
    ──────────────────────────────────────────── */
    .brand-block {
        text-align: center;
        margin-bottom: 32px;
        z-index: 10;
        animation: fadeUp 1.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        padding: 0 24px;
    }

    .brand-eyebrow {
        font-family: 'Josefin Sans', sans-serif;
        font-weight: 200; /* slightly heavier for readability */
        font-size: 0.6rem;
        letter-spacing: 0.5em;
        color: var(--ink-dim); /* now 0.85 white */
        text-transform: uppercase;
        margin-bottom: 14px;
        display: block;
        opacity: 0;
        animation: eyebrowPulse 8s 0.8s infinite;
    }

    /* Total cycle = 8s
       0s–0.5s  : fade in   (0%–6%)
       0.5s–4.5s: hold      (6%–56%)
       4.5s–5s  : fade out  (56%–63%)
       5s–8s    : invisible (63%–100%) */
    @keyframes eyebrowPulse {
        0%   { opacity: 0; transform: translateY(5px); }
        6%   { opacity: 1; transform: translateY(0); }
        56%  { opacity: 1; transform: translateY(0); }
        63%  { opacity: 0; transform: translateY(-3px); }
        100% { opacity: 0; transform: translateY(-3px); }
    }

    .brand-rule {
        display: block;
        width: 48px;
        height: 1px;
        background: var(--accent);
        margin: 0 auto 18px;
        opacity: 0.8; /* increased */
    }

    #brandMark {
        font-family: 'Cinzel', serif;
        font-size: clamp(1.1rem, 3.5vw, 1.75rem);
        letter-spacing: 0.45em;
        font-weight: 600;
        color: var(--ink); /* pure white */
        text-transform: uppercase;
        cursor: default;
        display: block;
        text-indent: 0.45em; /* compensate for letter-spacing at end */
    }

    .brand-divider {
        display: flex;
        align-items: center;
        gap: 14px;
        margin: 14px auto;
        width: min(360px, 80vw);
    }

    .brand-divider-line {
        flex: 1;
        height: 1px;
        background: var(--rule); /* now rgba(255,255,255,0.2) */
    }

    .brand-divider-diamond {
        width: 5px;
        height: 5px;
        background: var(--accent);
        transform: rotate(45deg);
        opacity: 0.9;
        flex-shrink: 0;
    }

    .sub-brand {
        font-family: 'Josefin Sans', sans-serif;
        font-size: 0.6rem;
        font-weight: 200;
        letter-spacing: 0.45em;
        color: var(--ink-dim); /* brightened */
        text-transform: uppercase;
        display: block;
        text-indent: 0.45em;
    }

    /* ────────────────────────────────────────────
       PILL / AURA CANVAS
    ──────────────────────────────────────────── */
    .pill-wrapper {
        position: relative;
        margin-bottom: 28px;
        animation: fadeUp 1.6s 0.15s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    /* subtle ambient ring behind the pill */
    .pill-halo {
        position: absolute;
        inset: -12px;
        border-radius: 9999px;
        background: radial-gradient(ellipse, var(--accent-glow) 0%, transparent 70%);
        opacity: 0.5;
        pointer-events: none;
        filter: blur(18px);
        z-index: -1;
    }

    #auraBox {
        position: relative;
        width: 90vw;
        max-width: 820px;
        /* height tracks width — always a true pill, never a rectangle */
        aspect-ratio: 4.1 / 1;
        border-radius: 9999px;
        background: #000;
        overflow: visible;
        transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1), opacity 1s;
        box-shadow:
            0 0 0 1px rgba(0,0,0,0.9),
            0 0 0 1.5px rgba(197,160,89,0.12),
            0 30px 80px rgba(0,0,0,0.7);
    }

    #auraCanvas {
        width: 100%;
        height: 100%;
        filter: blur(10px) contrast(2.0);
        cursor: crosshair;
        border-radius: 9999px;
        touch-action: none;
        background: #000;
        display: block;
    }

    /* lacquer lens — warm gold tint */
    .lacquer-lens {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none;
        z-index: 20;
        border-top: 1px solid rgba(197,160,89,0.3);
        border-left: 1px solid rgba(197,160,89,0.1);
        border-bottom: 1px solid rgba(0,0,0,0.4);
        background:
            linear-gradient(180deg, rgba(255,255,255,0.04) 0%, transparent 50%),
            radial-gradient(ellipse at 50% 0%, rgba(197,160,89,0.06) 0%, transparent 60%);
        box-shadow:
            inset 0 1px 0 rgba(255,255,255,0.06),
            inset 0 -1px 0 rgba(0,0,0,0.3);
        border-radius: 9999px;
    }

    /* catalog label beneath pill */
    .pill-label {
        text-align: center;
        margin-top: 14px;
        font-family: 'Josefin Sans', sans-serif;
        font-weight: 200;
        font-size: 0.55rem;
        letter-spacing: 0.5em;
        color: var(--ink-ghost); /* now 0.6 white */
        text-transform: uppercase;
        text-indent: 0.5em;
    }

    .pill { border-radius: 100px; }

    /* ────────────────────────────────────────────
       SWATCH / COLOR CHALLENGE
    ──────────────────────────────────────────── */
    .swatch-panel {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        z-index: 10;
        animation: fadeUp 1.8s 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .swatch-container {
        display: flex;
        align-items: center;
        gap: 16px;
    }

    .swatch-label {
        font-family: 'Josefin Sans', sans-serif;
        font-weight: 200;
        font-size: 0.5rem;
        letter-spacing: 0.5em;
        color: var(--ink-dim); /* brightened */
        text-transform: uppercase;
    }

    .target-circle {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        background: #000;
        border: 1px solid var(--accent);
        box-shadow:
            0 0 0 4px rgba(0,0,0,0.5),
            0 0 20px var(--accent-glow);
        transition: background 0.2s ease;
    }

    .instruction {
        font-family: 'Josefin Sans', sans-serif;
        font-size: 0.65rem;
        font-weight: 200;
        letter-spacing: 0.4em;
        color: var(--ink-dim); /* much brighter */
        background: rgba(14,15,17,0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        padding: 14px 32px;
        border-radius: 60px;
        border: 1px solid var(--rule);
        max-width: 560px;
        text-align: center;
        line-height: 1.6;
        transition: opacity 0.3s;
        text-transform: uppercase;
        text-indent: 0.4em;
    }

    .instruction.hidden { display: none; }

    /* ────────────────────────────────────────────
       QUADRANT / PORTFOLIO GRID
    ──────────────────────────────────────────── */
    .quadrant-grid {
        display: none;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
        max-width: 820px;
        width: 90vw;
        margin: 28px auto 0;
        opacity: 0;
        transition: opacity 0.8s ease;
        z-index: 10;
        padding: 0 2px;
    }

    .quadrant-grid.visible {
        display: grid;
        opacity: 1;
    }

    @media (max-width: 600px) {
        .quadrant-grid.visible {
            grid-template-columns: 1fr;
            gap: 12px;
            width: 85vw;
        }
    }

    .quad-card {
        background: rgba(14,15,17,0.9);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--rule);
        border-radius: 4px;
        padding: 0;
        cursor: pointer;
        transition: all 0.35s cubic-bezier(0.23, 1, 0.32, 1);
        box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        font-family: 'Josefin Sans', sans-serif;
        font-weight: 300;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        color: var(--ink); /* base white */
        overflow: hidden;
        position: relative;
    }

    /* top accent bar */
    .quad-card::before {
        content: '';
        display: block;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--card-color, var(--accent)), transparent);
        opacity: 0.8; /* increased */
        transition: opacity 0.3s;
    }

    .quad-card:hover {
        transform: translateY(-4px);
        border-color: rgba(219,180,110,0.3);
        box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(219,180,110,0.2);
    }

    .quad-card:hover::before {
        opacity: 1;
    }

    .card-inner {
        padding: 24px 22px 22px;
        display: flex;
        flex-direction: column;
        gap: 0;
        height: 100%;
        position: relative;
    }

    /* radial color bloom */
    .card-bloom {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.35s;
        border-radius: 4px;
    }

    .quad-card:hover .card-bloom {
        opacity: 1;
    }

    .card-number {
        font-family: 'Cormorant Garamond', serif;
        font-style: italic;
        font-weight: 300;
        font-size: 0.75rem;
        color: var(--ink-ghost); /* now 0.6 white, much brighter than before */
        letter-spacing: 0.1em;
        margin-bottom: 14px;
        display: block;
    }

    .quad-card .main {
        font-family: 'Cinzel', serif;
        font-size: clamp(0.8rem, 2.5vw, 1rem);
        font-weight: 400;
        letter-spacing: 0.2em;
        line-height: 1.3;
        color: var(--ink); /* pure white */
        margin-bottom: 12px;
        text-indent: 0.2em;
    }

    .card-rule {
        width: 24px;
        height: 1px;
        background: var(--card-color, var(--accent));
        opacity: 0.7; /* increased */
        margin-bottom: 12px;
        transition: width 0.35s ease, opacity 0.35s;
    }

    .quad-card:hover .card-rule {
        width: 48px;
        opacity: 1;
    }

    .quad-card .sub {
        font-family: 'Josefin Sans', sans-serif;
        font-size: 0.6rem;
        font-weight: 200;
        color: var(--ink-dim); /* brightened */
        letter-spacing: 0.35em;
        line-height: 1.7;
        text-transform: uppercase;
        text-indent: 0.35em;
    }

    .card-arrow {
        margin-top: auto;
        padding-top: 18px;
        font-size: 0.6rem;
        letter-spacing: 0.3em;
        color: var(--ink-ghost); /* brightened */
        font-weight: 200;
        text-transform: uppercase;
        transition: color 0.2s, letter-spacing 0.2s;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .quad-card:hover .card-arrow {
        color: var(--accent-dim);
        letter-spacing: 0.45em;
    }

    .card-arrow::before {
        content: '';
        display: block;
        width: 12px;
        height: 1px;
        background: currentColor;
        transition: width 0.2s;
    }

    .quad-card:hover .card-arrow::before {
        width: 20px;
    }

    /* ────────────────────────────────────────────
       ACCURACY (subtly styled, post-challenge)
    ──────────────────────────────────────────── */
    .accuracy-section {
        display: none;
        flex-direction: column;
        align-items: center;
        margin: 16px auto 0;
        width: 90vw;
        max-width: 600px;
        opacity: 0;
        transition: opacity 0.5s ease;
        z-index: 15;
    }

    .accuracy-section.visible {
        display: flex;
        opacity: 1;
    }

    .accuracy-pill {
        font-family: 'Josefin Sans', sans-serif;
        font-weight: 200;
        background: transparent;
        border: 1px solid var(--rule);
        border-radius: 60px;
        padding: 10px 24px;
        font-size: 0.55rem;
        letter-spacing: 0.45em;
        color: var(--ink-dim); /* brightened */
        cursor: pointer;
        transition: all 0.2s ease;
        text-transform: uppercase;
        margin-bottom: 14px;
        text-indent: 0.45em;
    }

    .accuracy-pill:hover {
        border-color: var(--accent-dim);
        color: var(--accent-dim);
    }

    .stats-display {
        background: rgba(14,15,17,0.8);
        backdrop-filter: blur(12px);
        border-radius: 4px;
        padding: 20px 28px;
        border: 1px solid var(--rule);
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
        gap: 32px;
        font-family: 'Josefin Sans', sans-serif;
        font-weight: 300;
        width: fit-content;
        margin: 0 auto;
    }

    .stat-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
    }

    .stat-label {
        font-size: 0.5rem;
        letter-spacing: 0.5em;
        color: var(--ink-ghost); /* brightened */
        text-transform: uppercase;
        text-indent: 0.5em;
    }

    .stat-value {
        font-family: 'Cormorant Garamond', serif;
        font-weight: 300;
        font-size: 1.8rem;
        color: var(--ink); /* pure white */
        line-height: 1;
    }

    .stat-value.percent {
        font-size: 2.2rem;
        color: var(--accent);
    }

    /* ────────────────────────────────────────────
       FOOTER
    ──────────────────────────────────────────── */
    .copyright-footer {
        width: 100%;
        text-align: center;
        padding: 24px 0 8px;
        font-family: 'Josefin Sans', sans-serif;
        font-size: 0.55rem;
        font-weight: 200;
        letter-spacing: 0.35em;
        color: var(--ink-dim); /* 0.85 white — very legible */
        flex-shrink: 0;
        z-index: 10;
        text-indent: 0.35em;
        text-transform: uppercase;
    }

    .footer-rule {
        display: block;
        width: 32px;
        height: 1px;
        background: var(--rule);
        margin: 0 auto 14px;
    }

    /* ────────────────────────────────────────────
       ANIMATIONS
    ──────────────────────────────────────────── */
    @keyframes fadeUp {
        from {
            opacity: 0;
            transform: translateY(24px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* ────────────────────────────────────────────
       RESPONSIVE — FLUID SCALING
    ──────────────────────────────────────────── */

    /* Tablet / large phone landscape */
    @media (max-width: 768px) {
        .brand-block {
            margin-bottom: 24px;
        }
        .pill-wrapper {
            margin-bottom: 20px;
        }
        .quadrant-grid {
            gap: 12px;
        }
    }

    /* Phone portrait */
    @media (max-width: 500px) {
        .game-content {
            padding-top: calc(var(--safe-top) + 20px);
            padding-bottom: calc(var(--safe-bottom) + 20px);
        }
        .brand-block {
            margin-bottom: 18px;
        }
        #brandMark {
            font-size: 1rem;
            letter-spacing: 0.3em;
        }
        .sub-brand {
            font-size: 0.52rem;
            letter-spacing: 0.3em;
        }
        .brand-eyebrow {
            font-size: 0.52rem;
            letter-spacing: 0.35em;
        }
        .pill-wrapper {
            margin-bottom: 16px;
        }
        /* pill-label tightened */
        .pill-label {
            font-size: 0.45rem;
            letter-spacing: 0.3em;
            margin-top: 10px;
        }
        .target-circle {
            width: 42px;
            height: 42px;
        }
        .instruction {
            font-size: 0.55rem;
            padding: 11px 18px;
            letter-spacing: 0.3em;
            max-width: 88vw;
        }
        .quad-card .main {
            font-size: 0.82rem;
            letter-spacing: 0.15em;
        }
        .quad-card .sub {
            font-size: 0.56rem;
            letter-spacing: 0.25em;
        }
        .card-inner {
            padding: 18px 16px 16px;
        }
        .stat-value {
            font-size: 1.5rem;
        }
        .stat-value.percent {
            font-size: 1.9rem;
        }
        .accuracy-pill {
            font-size: 0.5rem;
            padding: 9px 20px;
        }
    }

    /* Very small phones (SE, etc.) */
    @media (max-width: 375px) {
        #brandMark {
            font-size: 0.88rem;
            letter-spacing: 0.22em;
        }
        .quad-card .main {
            font-size: 0.75rem;
        }
        .quadrant-grid {
            gap: 10px;
        }
    }
</style>
</head>
<body>
<div class="game-content">

    <!-- ── MASTHEAD ── -->
    <div class="brand-block">
        <span class="brand-eyebrow">Est. 2012 &nbsp;·&nbsp; Fort Worth</span>
        <span class="brand-rule"></span>
        <span id="brandMark">Dovewood Capital</span>
        <div class="brand-divider">
            <span class="brand-divider-line"></span>
            <span class="brand-divider-diamond"></span>
            <span class="brand-divider-line"></span>
        </div>
        <span class="sub-brand">Premium Digital Property Spaces</span>
    </div>

    <!-- ── ANIMATED PILL ── -->
    <div class="pill-wrapper">
        <div class="pill-halo"></div>
        <div id="auraBox">
            <canvas id="auraCanvas"></canvas>
            <div class="lacquer-lens pill"></div>
        </div>
        <div class="pill-label">Chromatic Signature · Generative · Session-Unique</div>
    </div>

    <!-- ── COLOR CHALLENGE ── -->
    <div class="swatch-panel">
        <div class="swatch-container">
            <span class="swatch-label">Target</span>
            <div class="target-circle" id="swatch"></div>
            <span class="swatch-label">Hue</span>
        </div>
        <div class="instruction" id="dynamicInstruction"></div>
    </div>

    <!-- ── PORTFOLIO GRID ── -->
    <div class="quadrant-grid" id="quadrantGrid"></div>

    <!-- ── ACCURACY ── -->
    <div class="accuracy-section" id="accuracySection">
        <div class="accuracy-pill" id="accuracyPill">View Accuracy</div>
        <div class="stats-display" id="statsDisplay" style="display: none;">
            <div class="stat-item">
                <span class="stat-label">Hits</span>
                <span class="stat-value" id="statHits">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Misses</span>
                <span class="stat-value" id="statMisses">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Total</span>
                <span class="stat-value" id="statTotal">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Accuracy</span>
                <span class="stat-value percent" id="statAccuracy">0%</span>
            </div>
        </div>
    </div>

    <!-- ── FOOTER ── -->
    <div class="copyright-footer">
        <span class="footer-rule"></span>
        &copy; 2026 Dovewood Capital, LLC &nbsp;·&nbsp; All Rights Reserved
    </div>

</div>

<script>
(function() {
    window.score = 0;
    window.sessionActive = true;
    window.isPaused = false;

    let hitCount = 0;
    let missCount = 0;
    let challengeCompleted = false;

    const canvas = document.getElementById('auraCanvas');
    const ctx = canvas.getContext('2d');

    function rr(lo, hi) { return lo + Math.random() * (hi - lo); }

    const T_OFFSET = rr(0, 9999);

    let config = {
        omega:        rr(0.80, 1.25),
        scale:        rr(0.09, 0.16),
        tempo:        rr(0.85, 1.55),
        octaves:      3,
        bias:         1.0,
        lacunarity:   2.0,
        persistence:  0.5,
        driftRate:    rr(1.8, 3.4),
        fogDensity:   14,
        neonContrast: 1.5
    };

    const PALETTES = [
        () => ({ r: 180+~~rr(0,75), g: 120+~~rr(0,80), b:  40+~~rr(0,80) }),
        () => ({ r:  20+~~rr(0,80), g: 140+~~rr(0,80), b: 180+~~rr(0,75) }),
        () => ({ r: 160+~~rr(0,80), g:  20+~~rr(0,80), b: 180+~~rr(0,75) }),
        () => ({ r:  20+~~rr(0,60), g: 160+~~rr(0,80), b:  80+~~rr(0,80) }),
        () => ({ r: 200+~~rr(0,55), g:  60+~~rr(0,80), b: 100+~~rr(0,80) }),
        () => ({ r: 140+~~rr(0,80), g: 180+~~rr(0,60), b: 200+~~rr(0,55) }),
        () => ({ r: 200+~~rr(0,55), g:  60+~~rr(0,70), b:  20+~~rr(0,60) }),
        () => ({ r:  80+~~rr(0,80), g:  20+~~rr(0,60), b: 200+~~rr(0,55) }),
    ];

    const targetColor = PALETTES[~~rr(0, PALETTES.length)]();
    let currentTarget = { ...targetColor };

    const swatch  = document.getElementById('swatch');
    const instr   = document.getElementById('dynamicInstruction');
    const grid    = document.getElementById('quadrantGrid');
    const accuracySection = document.getElementById('accuracySection');
    const accuracyPill    = document.getElementById('accuracyPill');
    const statsDisplay    = document.getElementById('statsDisplay');
    const statHits        = document.getElementById('statHits');
    const statMisses      = document.getElementById('statMisses');
    const statTotal       = document.getElementById('statTotal');
    const statAccuracy    = document.getElementById('statAccuracy');

    swatch.style.backgroundColor = `rgb(${targetColor.r}, ${targetColor.g}, ${targetColor.b})`;
    instr.innerHTML = `<span style="font-family:'Josefin Sans',sans-serif; font-weight:200; font-size:0.62rem; letter-spacing:0.42em;">&#9663;&nbsp; Select the matching chromatic region above &nbsp;&#9663;</span>`;

    function updateAccuracyDisplay() {
        const total = hitCount + missCount;
        statHits.textContent    = hitCount;
        statMisses.textContent  = missCount;
        statTotal.textContent   = total;
        const accuracy = total === 0 ? 0 : Math.round((hitCount / total) * 100);
        statAccuracy.textContent = accuracy + '%';
    }

    function resizeCanvas() {
        const container = document.getElementById('auraBox');
        if (!container) return;
        canvas.width  = container.clientWidth  || 820;
        canvas.height = container.clientHeight || 200;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function draw() {
        if (!ctx || !canvas || canvas.width === 0 || canvas.height === 0) return;
        const w = canvas.width, h = canvas.height;
        const t = (performance.now() * 0.001 + T_OFFSET) * config.tempo;
        const img = ctx.createImageData(w, h);

        for (let i = 0; i < img.data.length; i += 4) {
            const x = (i/4) % w;
            const y = Math.floor((i/4) / w);
            let v = 0;
            for (let o = 1; o <= config.octaves; o++) {
                v += (Math.sin(x * config.scale * config.omega * o + t) +
                      Math.cos(y * config.scale * o + t)) / o;
            }
            img.data[i]   = Math.min(255, Math.max(0, (Math.sin(v)*100 + 100 + currentTarget.r) / 1.8));
            img.data[i+1] = Math.min(255, Math.max(0, (Math.cos(v)*100 + 100 + currentTarget.g) / 1.8));
            img.data[i+2] = Math.min(255, Math.max(0, (Math.sin(v+t)*100 + 100 + currentTarget.b) / 1.8));
            img.data[i+3] = 255;
        }
        ctx.putImageData(img, 0, 0);

        const auraBox = document.getElementById('auraBox');
        if (auraBox) {
            auraBox.style.transform = `translateX(${Math.sin(t*0.4)*25*config.driftRate}px) rotateY(${Math.sin(t*0.5)*18*config.driftRate}deg) rotateX(${-15+Math.cos(t*0.4)*10*config.driftRate}deg)`;
        }
        requestAnimationFrame(draw);
    }
    draw();

    // Live accent color sync from canvas center pixel
    function syncAuraColor() {
        if (!ctx || !canvas || canvas.width === 0) {
            requestAnimationFrame(syncAuraColor);
            return;
        }
        try {
            const px = ctx.getImageData(Math.floor(canvas.width/2), Math.floor(canvas.height/2), 1, 1).data;
            const r = px[0], g = px[1], b = px[2];
            const root = document.documentElement;
            root.style.setProperty('--accent',      `rgb(${r},${g},${b})`);
            root.style.setProperty('--accent-glow', `rgba(${r},${g},${b},0.45)`);
            root.style.setProperty('--accent-dim',  `rgba(${r},${g},${b},0.8)`);
            root.style.setProperty('--accent-soft', `rgba(${r},${g},${b},0.15)`);
            root.style.setProperty('--line',        `rgba(${r},${g},${b},0.3)`);
        } catch(e) {}
        requestAnimationFrame(syncAuraColor);
    }
    syncAuraColor();

    function handlePick(e) {
        if (challengeCompleted) return;
        e.preventDefault?.();

        const rect   = canvas.getBoundingClientRect();
        const scaleX = canvas.width  / rect.width;
        const scaleY = canvas.height / rect.height;
        let clientX, clientY;

        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }

        const canvasX = (clientX - rect.left) * scaleX;
        const canvasY = (clientY - rect.top)  * scaleY;
        if (canvasX < 0 || canvasX >= canvas.width || canvasY < 0 || canvasY >= canvas.height) return;

        const pixel = ctx.getImageData(Math.floor(canvasX), Math.floor(canvasY), 1, 1).data;
        const dist  = Math.hypot(pixel[0]-targetColor.r, pixel[1]-targetColor.g, pixel[2]-targetColor.b);

        if (dist < 75) {
            hitCount++;
            challengeCompleted = true;
            swatch.style.display = 'none';
            instr.classList.add('hidden');
            renderQuadrantGrid();
            accuracySection.classList.add('visible');
            updateAccuracyDisplay();
        } else {
            missCount++;
            canvas.style.transition = 'filter 0.1s';
            canvas.style.filter = `blur(${config.fogDensity+4}px) contrast(${config.neonContrast+0.3})`;
            setTimeout(() => {
                canvas.style.filter = `blur(${config.fogDensity}px) contrast(${config.neonContrast})`;
            }, 150);
        }
        updateAccuracyDisplay();
    }

    function renderQuadrantGrid() {
        grid.innerHTML = '';

        const items = [
            {
                num:   'No. I',
                main:  'HoloKey',
                sub:   'Digital Identity Infrastructure',
                color: '#c8956c',
                url:   'https://www.holokey.io'
            },
            {
                num:   'No. II',
                main:  'YourChoiceAI',
                sub:   'You remain in control. We curate the process.',
                color: '#6a9fc0',
                url:   'https://www.yourchoiceai.com'
            },
            {
                num:   'No. III',
                main:  'TransparentRX',
                sub:   'Prescription Price Intelligence',
                color: '#c0607a',
                url:   'https://www.transparentrx.io'
            },
            {
                num:   'No. IV',
                main:  'Gallery of Ranges',
                sub:   'Curated archive of shooting ranges and trap venues',
                color: '#4e8e78',
                url:   'https://galleryofranges.space'
            }
        ];

        items.forEach((item, i) => {
            const card = document.createElement('div');
            card.className = 'quad-card';
            card.style.setProperty('--card-color', item.color);
            card.style.animationDelay = `${i * 0.08}s`;

            card.innerHTML = `
                <div class="card-bloom" style="background: radial-gradient(circle at 20% 30%, ${item.color}30, transparent 75%)"></div>
                <div class="card-inner">
                    <span class="card-number">${item.num}</span>
                    <div class="main">${item.main}</div>
                    <div class="card-rule" style="background:${item.color}"></div>
                    <div class="sub">${item.sub}</div>
                    <div class="card-arrow">Visit</div>
                </div>
            `;

            card.addEventListener('click', () => window.open(item.url, '_blank'));
            card.style.opacity = '0';
            card.style.transform = 'translateY(16px)';
            card.style.transition = 'opacity 0.5s ease, transform 0.5s ease, box-shadow 0.35s ease, border-color 0.35s ease';
            grid.appendChild(card);

            // staggered entry
            setTimeout(() => {
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, 60 + i * 80);
        });

        grid.classList.add('visible');
    }

    accuracyPill.addEventListener('click', () => {
        statsDisplay.style.display = statsDisplay.style.display === 'none' ? 'flex' : 'none';
    });

    canvas.addEventListener('mousedown', handlePick);
    canvas.addEventListener('touchstart', handlePick, { passive: false });

    // Cleanup
    const oldBanner = document.querySelector('.scroll-banner');
    if (oldBanner) oldBanner.remove();
    document.querySelectorAll('#statsArray, #adminPanel, .fade-group, .museum-label').forEach(el => {
        if (el) el.style.display = 'none';
    });
})();
</script>
</body>
</html>
