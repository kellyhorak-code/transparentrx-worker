<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dovewood Capital | Digital Property Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>

:root{
--accent:#00E5FF;
--border:#1a1a1a;
}

body{
margin:0;
min-height:100vh;
font-family:'Space Grotesk',sans-serif;
background:#000;
color:white;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

overflow:hidden;
}

/* ambient glow */

body::before{
content:"";
position:fixed;
inset:-40%;
background:radial-gradient(circle,
rgba(0,229,255,.15),
transparent 65%);
animation:rotateGlow 40s linear infinite;
}

@keyframes rotateGlow{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

.spotlight{
position:fixed;
width:700px;
height:700px;
background:radial-gradient(circle,
rgba(0,229,255,.25),
transparent 70%);
pointer-events:none;
mix-blend-mode:screen;
transform:translate(-50%,-50%);
}

/* header */

h1{
font-size:48px;
color:var(--accent);
text-shadow:
0 0 15px rgba(0,229,255,.8),
0 0 60px rgba(0,229,255,.3);
margin-bottom:6px;
}

.subtitle{
font-family:'IBM Plex Mono',monospace;
font-size:11px;
letter-spacing:.35em;
text-transform:uppercase;
color:#777;
margin-bottom:80px;
}

/* grid */

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:55px;
width:80vw;
max-width:1050px;
perspective:1400px;
}

/* panel */

.panel{

position:relative;

height:240px;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

background:#0a0a0a;

border:1px solid var(--border);
border-radius:18px;

text-decoration:none;

overflow:hidden;

transition:
transform .4s cubic-bezier(.2,.9,.3,1),
box-shadow .4s,
border .3s;

box-shadow:
0 25px 80px rgba(0,0,0,.9);

}

/* preview canvas */

.preview{
position:absolute;
inset:0;
opacity:.35;
}

.panel:hover{

transform:
translateY(-12px)
scale(1.06);

border:1px solid var(--accent);

box-shadow:
0 40px 120px rgba(0,0,0,.95),
0 0 60px rgba(0,229,255,.3);

}

.panel-title{
font-size:28px;
font-weight:600;
margin-bottom:10px;
z-index:2;
}

.panel-desc{

font-family:'IBM Plex Mono',monospace;

font-size:11px;

letter-spacing:.18em;

text-transform:uppercase;

color:#888;

text-align:center;

max-width:240px;

z-index:2;

}

footer{
margin-top:80px;
font-family:'IBM Plex Mono',monospace;
font-size:11px;
letter-spacing:.2em;
text-transform:uppercase;
color:#333;
}

@media(max-width:900px){

.grid{
grid-template-columns:1fr;
}

h1{
font-size:34px;
}

}

</style>
</head>

<body>

<div class="spotlight" id="spotlight"></div>

<h1>Dovewood Capital</h1>
<div class="subtitle">Digital Property Portfolio</div>

<div class="grid" id="grid">

<a class="panel" href="https://holokey.dovecap.space">
<canvas class="preview" id="keyCanvas"></canvas>
<div class="panel-title">HoloKey.io</div>
<div class="panel-desc">Digital Identity Infrastructure</div>
</a>

<a class="panel" href="https://ai.dovecap.space">
<canvas class="preview" id="aiCanvas"></canvas>
<div class="panel-title">YourChoiceAI.com</div>
<div class="panel-desc">Consumer AI Decision Engine</div>
</a>

<a class="panel" href="https://rx.dovecap.space">
<canvas class="preview" id="rxCanvas"></canvas>
<div class="panel-title">TransparentRX.io</div>
<div class="panel-desc">Prescription Price Intelligence</div>
</a>

<a class="panel" href="https://ranges.dovecap.space">
<canvas class="preview" id="rangeCanvas"></canvas>
<div class="panel-title">Gallery of Ranges</div>
<div class="panel-desc">Museum-Like Curated Range Archive</div>
</a>

</div>

<footer>Dovewood Capital LLC</footer>

<script>

/* spotlight */

const spotlight=document.getElementById("spotlight")

document.addEventListener("mousemove",(e)=>{
spotlight.style.left=e.clientX+"px"
spotlight.style.top=e.clientY+"px"
})

/* gallery tilt */

const grid=document.getElementById("grid")

document.addEventListener("mousemove",(e)=>{

const x=(window.innerWidth/2-e.clientX)/35
const y=(window.innerHeight/2-e.clientY)/35

grid.style.transform=`rotateY(${x}deg) rotateX(${y}deg)`

})

/* HOLOKEY animation */

const keyCanvas=document.getElementById("keyCanvas")
const kctx=keyCanvas.getContext("2d")

function resize(canvas){
canvas.width=canvas.offsetWidth
canvas.height=canvas.offsetHeight
}

resize(keyCanvas)

let angle=0

function drawKey(){

kctx.clearRect(0,0,keyCanvas.width,keyCanvas.height)

kctx.strokeStyle="#00E5FF"
kctx.lineWidth=3

kctx.beginPath()

const x=keyCanvas.width/2+Math.cos(angle)*40
const y=keyCanvas.height/2+Math.sin(angle)*40

kctx.arc(x,y,20,0,Math.PI*2)

kctx.stroke()

angle+=.02

requestAnimationFrame(drawKey)

}

drawKey()

/* AI neural pulse */

const aiCanvas=document.getElementById("aiCanvas")
const actx=aiCanvas.getContext("2d")
resize(aiCanvas)

function drawAI(){

actx.clearRect(0,0,aiCanvas.width,aiCanvas.height)

for(let i=0;i<10;i++){

let x=Math.random()*aiCanvas.width
let y=Math.random()*aiCanvas.height

actx.fillStyle="rgba(0,229,255,.6)"
actx.beginPath()
actx.arc(x,y,2,0,Math.PI*2)
actx.fill()

}

requestAnimationFrame(drawAI)

}

drawAI()

/* RX chart */

const rxCanvas=document.getElementById("rxCanvas")
const rctx=rxCanvas.getContext("2d")
resize(rxCanvas)

let t=0

function drawChart(){

rctx.clearRect(0,0,rxCanvas.width,rxCanvas.height)

rctx.strokeStyle="#00E5FF"
rctx.lineWidth=2
rctx.beginPath()

for(let x=0;x<rxCanvas.width;x++){

let y=rxCanvas.height/2+Math.sin((x+t)/40)*20
rctx.lineTo(x,y)

}

rctx.stroke()

t+=2

requestAnimationFrame(drawChart)

}

drawChart()

/* CLAY TRAP animation */

const rangeCanvas=document.getElementById("rangeCanvas")
const gctx=rangeCanvas.getContext("2d")
resize(rangeCanvas)

let trapX=0
let trapY=0
let vx=5
let vy=-8

function drawTrap(){

gctx.clearRect(0,0,rangeCanvas.width,rangeCanvas.height)

trapX+=vx
trapY+=vy

vy+=.2

gctx.fillStyle="#00E5FF"

gctx.beginPath()
gctx.arc(trapX,trapY,6,0,Math.PI*2)
gctx.fill()

if(trapY>rangeCanvas.height||trapX>rangeCanvas.width){
trapX=0
trapY=rangeCanvas.height
vy=-8
}

requestAnimationFrame(drawTrap)

}

trapX=0
trapY=rangeCanvas.height

drawTrap()

</script>

</body>
</html>
